  const soldList=A.sold.length?`<div class="eyebrow" style="margin-top:16px">Solgt</div><div class="paper">${A.sold.map(s=>`<div class="pay-row"><span class="nm">${s.name}</span><span style="font-size:12px;color:${s.winner?'var(--won)':'var(--ink-soft)'}">${s.winner?nameOf(s.winner)+' \u00b7 '+s.price+' festkr.':'ingen bud'}</span></div>`).join('')}</div>`:'';
  if(!A.running && !A.done){
    if(isAdmin()){
      return `<div class="paper pad" style="margin-bottom:14px"><div class="admin-note">Admin \u00b7 ting p\u00e5 auktionen</div>
        <p style="font-size:12px;color:var(--ink-soft);margin:6px 0 10px">Tjek listen, tilf\u00f8j eller fjern, og start s\u00e5 auktionen. Tingene kommer op \u00e9n ad gangen i <b>tilf\u00e6ldig r\u00e6kkef\u00f8lge</b> \u2014 ingen ved, hvad der kommer n\u00e6st.</p>
        <div style="display:flex;gap:8px"><input id="auctItem" placeholder="fx \u00bbEn omgang shots\u00ab" style="flex:1"><button class="btn btn-dark" style="width:auto;padding:0 16px" onclick="addAuctionItem()">Tilf\u00f8j</button></div>
        ${A.items.length?`<div style="margin-top:12px">${A.items.map(it=>`<div style="display:flex;justify-content:space-between;align-items:center;font-size:13px;border-top:1px solid var(--paper-line);padding:7px 0"><span>${it.name}</span><button class="chk" style="padding:3px 9px" onclick="removeAuctionItem('${it.id}')">fjern</button></div>`).join('')}</div>`:'<div style="font-size:12px;color:var(--ink-soft);margin-top:10px">Ingen ting tilf\u00f8jet endnu.</div>'}
        </div>${budgets}
        <button class="btn btn-dark" style="margin-top:6px" ${A.items.length?'':'disabled'} onclick="startAuction()">\ud83d\udd28 Start auktionen (${A.items.length} ting)</button>`;
    }
    return `<div class="paper pad"><div class="empty" style="padding:20px 0"><div class="big">Afventer\u2026</div>Auktionen starter, n\u00e5r admin er klar. Hold dig klar til at byde!</div></div>${budgets}`;
  }
  if(A.running){
    const it=currentAuctionItem(); const left=Math.max(0,Math.ceil((A.endsAt-Date.now())/1000));
    const rem=auctionRemaining(S.user); const isLead=A.highBy===S.user;
    const bidBox = isLead
      ? `<div style="text-align:center;color:var(--won);font-family:'Oswald';font-weight:600;padding:10px 0">Du f\u00f8rer buddet \ud83c\udfc6</div>`
      : `<div style="display:flex;gap:8px;margin-top:10px">
           <button class="btn btn-ghost" style="flex:1" onclick="bidPlus(10)">+10</button>
           <button class="btn btn-ghost" style="flex:1" onclick="bidPlus(25)">+25</button>
           <button class="btn btn-ghost" style="flex:1" onclick="bidPlus(50)">+50</button></div>
         <div style="display:flex;gap:8px;margin-top:8px"><input type="number" id="bidInp" placeholder="eget bud" style="flex:1"><button class="btn btn-dark" style="width:auto;padding:0 18px" onclick="bidCustom()">Byd</button></div>
         <div style="font-size:11px;color:var(--ink-soft);margin-top:6px;text-align:center">Du har ${rem} festkr. tilbage \u00b7 mindste bud ${A.high>0?A.high+1:10}</div>`;
    return `<div class="paper pad" style="margin-bottom:14px;text-align:center">
        <div style="font-family:'Oswald';text-transform:uppercase;letter-spacing:.14em;color:var(--amber-soft);font-size:12px">Genstand ${A.idx+1}/${A.order.length}</div>
        <div style="font-family:'Oswald';font-weight:700;font-size:30px;margin:6px 0">${it?it.name:''}</div>
        <div style="font-size:13px;color:var(--ink-soft)">${A.highBy?'<b style="color:var(--ink)">'+nameOf(A.highBy)+'</b> f\u00f8rer med <b style="color:var(--ink)">'+A.high+' festkr.</b>':'Ingen bud endnu \u2014 \u00e5bningsbud fra 10'}</div>
        <div id="auctTimer" style="font-family:'JetBrains Mono';font-size:32px;font-weight:700;margin-top:8px;color:${left<=5?'var(--lost)':'var(--ink)'}">${left}s</div>
        ${bidBox}
      </div>${budgets}${soldList}`;
  }
  return `<div class="paper pad" style="margin-bottom:14px;text-align:center"><div style="font-family:'Oswald';font-weight:700;font-size:24px;color:var(--amber)">Auktionen er færdig \ud83c\udf89</div><p style="font-size:13px;color:var(--ink-soft);margin-top:6px">Alle ting er solgt. Se nedenfor hvem der fik hvad. Den står her, til admin starter en ny sæson.</p></div>
    ${budgets}${soldList}</section>`;
}
function notifLines(){
  const r=openRound(); let lines=[];
  if(r&&r.status==='open'){ const missing=PLAYERS.filter(n=>!r.picks[n]&&!(r.absent||[]).includes(n)); 
    lines.push(["24 timer før kupon-deadline", missing.length?("Til: "+missing.map(nameOf).join(", ")):"Alle har indsendt eller meldt afbud"]); }
  else lines.push(["24 timer før kupon-deadline","Ingen åben runde lige nu"]);
  const month=new Date().toISOString().slice(0,7); const pm=S.payments[month]||{};
  const unpaid=PLAYERS.filter(n=>!pm['fee_'+n]);
  lines.push(["24 timer før betalingsfrist", unpaid.length?("Til: "+unpaid.map(nameOf).join(", ")):"Alle har betalt"]);
  lines.push(["Lørdag kl. 10","Til alle: »Kuponen er lukket«"]);
  lines.push(["Når måneden lukkes","Til alle: månedens taber + bøde + ny måned åben"]);
  return lines;
}
function notifInner(){ return `<div class="paper">${notifLines().map(([t,d])=>`<div class="sub-row"><div><div class="nm" style="font-size:15px">${t}</div><div class="desc">${d}</div></div><span style="font-size:18px">🔔</span></div>`).join('')}</div>`; }
function pushStatusText(){
  if(!messagingSupported) return 'Din browser/telefon understøtter desværre ikke web-notifikationer (på iPhone: læg appen på hjemmeskærmen først, så virker det).';
  if(Notification.permission==='denied') return 'Du har blokeret notifikationer for denne side i din browser — slå dem til under browserens/telefonens indstillinger for at aktivere.';
  if(myPushToken) return 'Notifikationer er aktiveret på denne enhed.';
  return 'Notifikationer er ikke aktiveret på denne enhed endnu.';
}
function notifBody(){
  const pushCard=`<div class="paper pad" style="margin-bottom:14px"><div class="admin-note">Push-notifikationer på denne enhed</div>
    <p style="font-size:13px;color:var(--ink-soft);margin-bottom:10px">${pushStatusText()}</p>
    ${myPushToken?`<button class="btn btn-ghost" onclick="disablePush()">Slå fra på denne enhed</button>`:`<button class="btn btn-dark" onclick="enablePush()" ${messagingSupported?'':'disabled'}>🔔 Aktivér notifikationer</button>`}</div>`;
  return `${pushCard}<div class="paper pad" style="margin-bottom:14px"><p style="font-size:13px;color:var(--ink-soft)">Disse sendes automatisk som push-notifikationer på tidspunktet nedenfor til dem, der mangler noget. Her vises hvem der lige nu ville få besked:</p></div>${notifInner()}</section>`;
}
let myPushToken=null;
async function enablePush(){
  if(!messagingSupported){ toast('Din browser/telefon understøtter desværre ikke web-push.'); return; }
  try{
    const perm=await Notification.requestPermission();
    if(perm!=='granted'){ toast('Du sagde nej tak til notifikationer i browseren.'); moreView='notif'; renderMore(); return; }
    const reg=await navigator.serviceWorker.ready;
    const token=await messaging.getToken({vapidKey:VAPID_KEY, serviceWorkerRegistration:reg});
    if(!token){ toast('Kunne ikke oprette en notifikations-nøgle — prøv igen.'); return; }
    myPushToken=token;
    await pushTokensCol.doc(token).set({token, player:S.user, uid:auth.currentUser.uid, updatedAt:Date.now()});
    toast('🔔 Notifikationer er aktiveret på denne enhed.');
    moreView='notif'; renderMore();
  }catch(e){ console.error(e); toast('Kunne ikke aktivere notifikationer: '+e.message); }
}
async function disablePush(){
  if(!myPushToken)return;
  try{ await pushTokensCol.doc(myPushToken).delete(); }catch(e){ console.error(e); }
  myPushToken=null; toast('Notifikationer er slået fra på denne enhed.'); moreView='notif'; renderMore();
}
async function refreshPushTokenIfGranted(){
  if(!messagingSupported || Notification.permission!=='granted') return;
  try{
    const reg=await navigator.serviceWorker.ready;
    const token=await messaging.getToken({vapidKey:VAPID_KEY, serviceWorkerRegistration:reg});
    if(token){ myPushToken=token; await pushTokensCol.doc(token).set({token, player:S.user, uid:auth.currentUser.uid, updatedAt:Date.now()}, {merge:true}); }
  }catch(e){ console.error(e); }
}
if(messaging) messaging.onMessage(payload=>{
  const t=(payload.notification&&payload.notification.title)||'Rona Defence League';
  const b=(payload.notification&&payload.notification.body)||'';
  toast('🔔 '+t+(b?('\n'+b):''));
});
function rulesBody(){
  return `<div class="rule"><h3><span class="n">01</span>Indskud</h3><p>${fee()} kr om måneden pr. mand — overføres på MobilePay til Magnus (42174259), som holder klubbens fælles pulje. Puljen er bankrollen og bruges sammen én gang om året. (Almindelig overførsel, ikke en MobilePay-box — så undgår vi box-gebyret.) Taksten kan justeres af admin, hvis I bliver enige om det.</p></div>
    <div class="rule"><h3><span class="n">02</span>Runder</h3><p>Vi spiller 1. og 3. lørdag i måneden, og alle indsender ét spil. Næste runde åbner automatisk, så snart den forrige er afgjort — så du kan melde ind, når du er klar. Deadline er kl. 10 om lørdagen. Dit spil skal afvikles i weekenden: kampen må tidligst starte lørdag kl. 12 og skal være slut senest søndag kl. 23.59 — medmindre andet aftales (de andre skal sige god for det).</p></div>
    <div class="rule"><h3><span class="n">03</span>Kuponen</h3><p>Alle spil samles til én akkumuleret kupon, som admin spiller. Vi flatbetter <b>100 kr pr. kupon</b> hele sæsonen — fast og enkelt, så puljen holder til festen — medmindre andet aftales (fx en ekstra satsning efter en vild stime). Gevinster går tilbage i puljen.</p></div>
    <div class="rule"><h3><span class="n">04</span>Point & stilling</h3><p>Point gives som <b>ren placering pr. runde</b>: med fire spillere er det <b>3 / 2 / 1 / 0</b> for bedste til dårligste resultat den runde. Vinder du, rangeres du efter dine odds (mest værdi = flest point); taber du eller springer over, får du 0 den runde. Pointene lægges <b>altid oven i</b> — de kan kun gå op, aldrig ned, uanset hvor mange der spiller. De løber i sæsontabellen og afgør stillingen. Står to helt lige, deler de en placering.</p></div>
    <div class="rule"><h3><span class="n">05</span>Månedens taber</h3><p>Den med færrest point i måneden betaler 25 kr i puljen — eller 50 kr, hvis månedens TB% er under 100 %. Har du slet ikke spillet en måned, er du automatisk blandt taberne (25 kr). Står to helt lige i bund, betaler de begge.</p></div>
    <div class="rule"><h3><span class="n">06</span>Gult & rødt kort</h3><p>Glemmer du at sende spil eller betale: 1. gang gult, 2. gang rødt + 25 kr. Et gult forsvinder efter 3 rene forpligtelser. Kort handler om forglemmelser, ikke om at være dårligst — så du kan i samme måned både få et kort og være månedens taber. Begge bøder ryger i kassen.</p></div>
    <div class="rule"><h3><span class="n">07</span>Afbud & void</h3><p>Melder du afbud, springes du over uden kort første gang. Men afbud i to runder i træk giver et gult kort — præcis som at glemme en kupon eller en betaling (og rødt kort + 25 kr, hvis du allerede har gult). Bliver en kamp aflyst (void), fjernes benet helt fra alle tal.</p></div>
    <div class="rule"><h3><span class="n">08</span>Power League</h3><p>Du optjener EXP ved at spille — og ekstra når du rammer — og spinner den enarmede tyveknægt for power-ups. De påvirker <b>kun månedens stilling</b>, altså hvem der ender sidst og betaler taber-bøden den måned. De rører <b>aldrig sæsontabellen eller statistikken</b>. En sabotage eller et tyveri kan sende en i bund for måneden — men tyveri virker kun, hvis offeret rent faktisk fik point (ellers er det spildt).</p></div>
    <div class="rule"><h3><span class="n">09</span>Sæson</h3><p>Udgangspunktet er, at sæsonen starter på <b>1. lørdag i september</b> og kører frem til sommeren med runder hver 1. og 3. lørdag. Men I bestemmer selv: admin kan vælge at gå i gang tidligere, og så lægger første runde sig på den næste planlagte lørdag. Til sidst lukker admin sæsonen, årets priser kåres, festkasserne bruges på årsauktionen, og sæsonen bliver stående, til admin starter en ny.</p></div></section>`;
}

/* =================== IN-APP DIALOGS =================== */
let toastTimer=null;
function toast(msg){ let t=document.getElementById('toast'); if(!t){ t=document.createElement('div'); t.id='toast'; document.body.appendChild(t); } t.textContent=msg; void t.offsetWidth; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'), 4200); }
function confirmModal(msg, onYes, yesLabel){
  const ex=document.getElementById('cmodal'); if(ex)ex.remove();
  const ov=document.createElement('div'); ov.id='cmodal';
  ov.innerHTML='<div class="box"><div class="msg"></div><div class="btn-row"><button class="btn btn-ghost" id="cmNo">Annuller</button><button class="btn btn-dark" id="cmYes"></button></div></div>';
  ov.querySelector('.msg').textContent=msg;
  ov.querySelector('#cmYes').textContent=yesLabel||'Bekræft';
  document.body.appendChild(ov);
  ov.querySelector('#cmNo').onclick=()=>ov.remove();
  ov.querySelector('#cmYes').onclick=()=>{ ov.remove(); onYes(); };
}

/* =================== LOGIN / IDENTITY =================== */
const ADMIN_BOOTSTRAP_EMAIL='moberg1998@gmail.com';   // Moberg — forudgodkendt admin (se CLAUDE.md)
let loginMode='signin';
function toggleLoginMode(){ loginMode=loginMode==='signin'?'register':'signin'; renderLoginMode(); }
function renderLoginMode(){
  document.getElementById('loginErr').textContent='';
  document.getElementById('loginPass2Wrap').style.display=loginMode==='register'?'block':'none';
  document.getElementById('forgotWrap').style.display=loginMode==='register'?'none':'block';
  document.getElementById('loginBtn').textContent=loginMode==='register'?'Opret adgangskode':'Log ind';
  document.getElementById('loginSub').textContent=loginMode==='register'?'Nyt medlem — sæt din adgangskode':'Log ind med din klub-konto';
  document.getElementById('loginSwap').innerHTML=loginMode==='register'
    ? 'Har du allerede en konto? <a onclick="toggleLoginMode()">Log ind her</a>'
    : 'Nyt medlem, inviteret af admin? <a onclick="toggleLoginMode()">Opret adgangskode her</a>';
}
async function forgotPassword(){
  const email=(document.getElementById('loginEmail').value||'').trim().toLowerCase();
  const errEl=document.getElementById('loginErr');
  if(!email){ errEl.textContent='Skriv din e-mail herover først.'; return; }
  try{
    await auth.sendPasswordResetEmail(email);
    errEl.style.color='var(--won)'; errEl.textContent='Der er sendt en mail til '+email+' med et link til at nulstille adgangskoden.';
  }catch(e){ errEl.style.color='var(--lost)'; errEl.textContent=loginErrText(e); }
}
function loginErrText(e){
  const c=(e&&e.code)||'';
  if(c==='auth/invalid-email')return 'Ugyldig e-mail.';
  if(c==='auth/user-not-found')return 'Ingen konto med den e-mail.';
  if(c==='auth/wrong-password'||c==='auth/invalid-credential')return 'Forkert adgangskode.';
  if(c==='auth/email-already-in-use')return 'Der findes allerede en konto på den e-mail — log ind i stedet.';
  if(c==='auth/too-many-requests')return 'For mange forsøg — prøv igen om lidt.';
  if(c==='auth/weak-password')return 'Adgangskoden er for svag — brug mindst 6 tegn.';
  return 'Der gik noget galt: '+((e&&e.message)||e);
}
async function doLogin(){
  const email=(document.getElementById('loginEmail').value||'').trim().toLowerCase();
  const pass=document.getElementById('loginPass').value;
  const errEl=document.getElementById('loginErr'); errEl.textContent='';
  if(!email||!pass){ errEl.textContent='Udfyld e-mail og adgangskode.'; return; }
  try{
    if(loginMode==='signin'){
      await auth.signInWithEmailAndPassword(email,pass);
    } else {
      const pass2=document.getElementById('loginPass2').value;
      if(pass.length<6){ errEl.textContent='Adgangskoden skal være mindst 6 tegn.'; return; }
      if(pass!==pass2){ errEl.textContent='Adgangskoderne er ikke ens.'; return; }
      // Vi opretter Firebase-loginet først (kræver ikke Firestore-adgang), og tjekker/skriver
      // invite-dokumentet BAGEFTER, mens brugeren er logget ind — matcher sikkerhedsreglerne,
      // som kun tillader en logget ind bruger at læse/skrive sin egen invite.
      const cred=await auth.createUserWithEmailAndPassword(email,pass);
      try{
        const inv=await invitesCol.doc(email).get();
        if(inv.exists && inv.data().used){ await cred.user.delete(); errEl.textContent='Der er allerede oprettet en konto på den e-mail — log ind i stedet.'; return; }
        if(!inv.exists && email!==ADMIN_BOOTSTRAP_EMAIL){ await cred.user.delete(); errEl.textContent='Den e-mail er ikke inviteret af admin.'; return; }
        if(inv.exists) await invitesCol.doc(email).set({used:true, uid:cred.user.uid}, {merge:true});
        else await invitesCol.doc(email).set({name:"Moberg", isAdmin:true, used:true, uid:cred.user.uid});
      }catch(e2){ try{await cred.user.delete();}catch(_){} errEl.textContent=loginErrText(e2); return; }
    }
  }catch(e){ errEl.textContent=loginErrText(e); }
}
async function doLogout(){ confirmModal("Log ud af "+nameOf(S.user)+"s konto?", async ()=>{ stopSync(); await auth.signOut(); }, "Log ud"); }
function updateWho(){ document.getElementById('whoName').textContent=nameOf(S.user); document.getElementById('whoAdm').style.display=isAdmin()?'inline':'none'; }

/* =================== INIT =================== */
auth.onAuthStateChanged(async user=>{
  const loginEl=document.getElementById('loginScreen'), appEl=document.getElementById('appRoot');
  if(!user){ stopSync(); S=null; appEl.style.display='none'; loginEl.style.display='flex'; return; }
  const email=(user.email||'').toLowerCase();
  let inv=null;
  try{ const snap=await invitesCol.doc(email).get(); if(snap.exists)inv=snap.data(); }catch(e){ console.error(e); }
  if(!inv||!inv.name){
    document.getElementById('loginErr').textContent='Din konto er ikke sat op som klubmedlem endnu — kontakt admin.';
    await auth.signOut(); return;
  }
  if(inv.active===false){
    document.getElementById('loginErr').textContent='Din konto er deaktiveret — kontakt admin.';
    await auth.signOut(); return;
  }
  MY_NAME=inv.name;
  loginEl.style.display='none'; appEl.style.display='';
  await startSync();
  await ensureOpenRound();
  if(S.auction&&S.auction.running)startAuctionTimer();
  resetF(); updateWho(); renderAll(); go(currentScreen||'home');
  refreshPushTokenIfGranted();
});
renderLoginMode();
if(navigator.serviceWorker) navigator.serviceWorker.register('sw.js').catch(e=>console.error(e));
