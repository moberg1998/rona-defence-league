<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Rona Defence League</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0C1B18">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rona Defence League">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-messaging-compat.js"></script>
<style>
  :root{
    --board:#0C1B18; --board-2:#102621; --board-line:rgba(243,169,59,.18);
    --paper:#EBEEEA; --paper-2:#E3E7E0; --paper-line:#D6DBD4;
    --ink:#131B18; --ink-soft:#5B665F;
    --amber:#F3A93B; --amber-soft:#C98B2E;
    --won:#2FA56C; --lost:#DD5147; --yellow:#E8B73A; --red:#DD5147;
    --shadow:0 18px 40px -18px rgba(0,0,0,.55);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{background:var(--board);color:var(--paper);font-family:'Inter',system-ui,sans-serif;line-height:1.5;min-height:100vh;padding-bottom:86px}
  .wrap{max-width:720px;margin:0 auto;padding:0 16px}

  .board{background:radial-gradient(120% 140% at 100% 0%, rgba(243,169,59,.10), transparent 55%),var(--board-2);border-bottom:1px solid var(--board-line);padding:14px 0;position:sticky;top:0;z-index:5;box-shadow:0 8px 24px -16px rgba(0,0,0,.8)}
  .board .wrap{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .brand{display:flex;align-items:center;gap:9px;min-width:0}
  .brand .dot{flex-shrink:0;width:9px;height:9px;border-radius:50%;background:var(--amber);box-shadow:0 0 12px 1px rgba(243,169,59,.7)}
  .brand h1{font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:.05em;text-transform:uppercase;font-size:clamp(16px,4.4vw,24px);line-height:1.04}
  .who-pill{flex-shrink:0;display:flex;align-items:center;gap:7px;background:rgba(235,238,234,.07);border:1px solid var(--board-line);border-radius:30px;padding:5px 10px 5px 12px;cursor:pointer}
  .who-pill .nm{font-family:'Oswald',sans-serif;font-weight:500;font-size:15px;color:var(--paper)}
  .who-pill .adm{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.1em;background:var(--amber);color:var(--board);padding:1px 5px;border-radius:4px;font-weight:700}
  .who-pill select{position:absolute;opacity:0;width:1px;height:1px}

  .screen{display:none;animation:fade .25s ease}
  .screen.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  section{margin-top:24px}
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--amber);margin-bottom:11px;display:flex;align-items:center;gap:10px}
  .eyebrow::after{content:"";flex:1;height:1px;background:var(--board-line)}

  .paper{background:var(--paper);color:var(--ink);border-radius:10px;box-shadow:var(--shadow);overflow:hidden}
  .pad{padding:16px}

  /* buttons */
  .btn{font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:.06em;text-transform:uppercase;font-size:14px;border:none;border-radius:8px;padding:11px 18px;cursor:pointer;transition:transform .08s,opacity .12s}
  .btn:active{transform:translateY(1px)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn-dark{background:var(--ink);color:var(--paper)}
  .btn-amber{background:var(--amber);color:var(--board)}
  .btn-ghost{background:transparent;border:1px solid var(--paper-line);color:var(--ink)}
  .btn-ghost-d{background:transparent;border:1px solid rgba(235,238,234,.38);color:#EBEEEA}
  .btn-red{background:var(--lost);color:#fff}
  .btn-row{display:flex;gap:8px;flex-wrap:wrap}

  input,select{font-family:'Inter',sans-serif;font-size:14px;border:1px solid var(--paper-line);background:#fff;border-radius:7px;padding:9px 10px;color:var(--ink);width:100%}
  input[type=number],input[type=date]{font-family:'JetBrains Mono',monospace}
  label.fld{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);display:block;margin-bottom:5px}
  .field{margin-bottom:12px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:10px}

  /* home cards */
  .snapshot{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .mini{background:var(--paper);color:var(--ink);border-radius:10px;box-shadow:var(--shadow);padding:14px 16px}
  .mini .lab{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px}
  .mini .val{font-family:'Oswald',sans-serif;font-size:24px;font-weight:600;line-height:1.05}
  .mini .sub{font-size:12px;color:var(--ink-soft);margin-top:3px}
  .loser-now{color:var(--lost)}

  .pool-strip{display:flex;justify-content:space-between;align-items:center;background:var(--paper);color:var(--ink);border-radius:10px;box-shadow:var(--shadow);padding:14px 16px;margin-top:12px}
  .pool-strip .k{font-family:'Oswald',sans-serif;font-size:28px;font-weight:600;color:var(--amber-soft);line-height:1}
  .pool-strip .l{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft)}

  /* roster / cards row */
  .roster{display:flex;gap:8px;margin-top:12px}
  .rchip{flex:1;background:var(--paper);border-radius:10px;box-shadow:var(--shadow);padding:10px 8px;text-align:center}
  .rchip .n{font-family:'Oswald',sans-serif;font-weight:500;font-size:15px;color:var(--ink)}
  .rchip .c{font-size:15px;margin-top:3px;height:18px}
  .rchip .s{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--ink-soft);margin-top:2px}

  /* tables */
  table{width:100%;border-collapse:collapse}
  .paper th,.paper td{padding:9px 8px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:13px}
  .paper th{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);font-weight:500;border-bottom:1px solid var(--paper-line)}
  .paper td:first-child,.paper th:first-child{text-align:left;font-family:'Oswald',sans-serif;font-weight:500;font-size:15px}
  .paper tr+tr td{border-top:1px solid var(--paper-line)}
  .rankbadge{display:inline-block;width:18px;text-align:center;color:var(--amber-soft);font-weight:700;margin-right:6px}
  .lead td{background:rgba(243,169,59,.10)}
  .pts{font-weight:700;color:var(--ink)}

  /* round / submissions */
  .sub-row{display:flex;align-items:center;justify-content:space-between;padding:11px 16px}
  .sub-row+.sub-row{border-top:1px solid var(--paper-line)}
  .sub-row .nm{font-family:'Oswald',sans-serif;font-weight:500;font-size:16px}
  .sub-row .desc{font-size:12px;color:var(--ink-soft)}
  .badge{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.04em;padding:3px 8px;border-radius:20px}
  .b-in{background:rgba(47,165,108,.15);color:var(--won)}
  .b-wait{background:var(--paper-2);color:var(--ink-soft)}
  .b-odds{background:rgba(243,169,59,.16);color:var(--amber-soft)}
  .status-line{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;color:var(--ink-soft);padding:0 16px 12px}

  /* match search */
  .results{margin-top:6px;border:1px solid var(--paper-line);border-radius:8px;overflow:hidden;display:none}
  .results.show{display:block}
  .mres{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;cursor:pointer;background:#fff}
  .mres+.mres{border-top:1px solid var(--paper-line)}
  .mres:active{background:var(--paper-2)}
  .mres .t{font-family:'Oswald',sans-serif;font-weight:500;font-size:15px;color:var(--ink)}
  .mres .m{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em}
  .mres .sp{font-family:'JetBrains Mono',monospace;font-size:9px;background:var(--paper-2);color:var(--ink-soft);padding:2px 6px;border-radius:4px;text-transform:uppercase}
  .chosen{background:var(--paper-2);border-radius:8px;padding:10px 12px;margin-bottom:12px}
  .chosen .t{font-family:'Oswald',sans-serif;font-weight:600;font-size:16px}
  .chosen .m{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-soft);text-transform:uppercase}
  .seg{display:flex;gap:6px;flex-wrap:wrap}
  .seg button{flex:1;min-width:60px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;border:1px solid var(--paper-line);background:#fff;color:var(--ink-soft);border-radius:7px;padding:9px 6px;cursor:pointer}
  .seg button.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}

  /* slips */
  .slip{margin-bottom:14px}
  .slip-head{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px dashed var(--paper-line)}
  .slip-head .d{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-soft)}
  .stamp{font-family:'Oswald',sans-serif;font-weight:700;letter-spacing:.1em;text-transform:uppercase;font-size:12px;padding:3px 9px;border-radius:5px;border:2px solid currentColor}
  .stamp.win{color:var(--won)} .stamp.lose{color:var(--lost)} .stamp.pend{color:var(--amber-soft)}
  .leg{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center;padding:9px 16px}
  .leg+.leg{border-top:1px solid var(--paper-line)}
  .leg .who{font-family:'Oswald',sans-serif;font-weight:500;font-size:15px}
  .leg .meta{font-size:11px;color:var(--ink-soft)}
  .leg .odds{font-family:'JetBrains Mono',monospace;font-weight:500;font-size:14px}
  .leg .tick{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px}
  .tick.w{background:rgba(47,165,108,.14);color:var(--won)} .tick.l{background:rgba(221,81,76,.13);color:var(--lost)} .tick.p{background:var(--paper-2);color:var(--ink-soft)}
  .chip{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.05em;text-transform:uppercase;background:var(--paper-2);color:var(--ink-soft);padding:1px 6px;border-radius:4px;margin-left:5px}
  .slip-foot{display:flex;justify-content:space-between;padding:11px 16px;background:var(--paper-2);font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-soft)}
  .slip-foot b{color:var(--ink)}

  /* settle */
  .settle-leg{padding:14px 16px}
  .settle-leg+.settle-leg{border-top:1px solid var(--paper-line)}

  /* stat cards */
  .statgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .pcard{background:var(--paper);color:var(--ink);border-radius:10px;box-shadow:var(--shadow);padding:14px}
  .pcard h3{font-family:'Oswald',sans-serif;font-weight:600;font-size:17px;display:flex;align-items:center;gap:8px;margin-bottom:9px}
  .pcard .pr{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:12px;padding:3px 0;color:var(--ink-soft)}
  .pcard .pr b{color:var(--ink)}

  /* payments */
  .pay-month{margin-bottom:14px}
  .pay-head{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:1px solid var(--paper-line)}
  .pay-head .m{font-family:'Oswald',sans-serif;font-weight:600;text-transform:uppercase;font-size:15px}
  .pay-row{display:flex;justify-content:space-between;align-items:center;padding:10px 16px}
  .pay-row+.pay-row{border-top:1px solid var(--paper-line)}
  .pay-row .nm{font-family:'Oswald',sans-serif;font-weight:500;font-size:15px}
  .chk{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;border:1px solid var(--paper-line);background:#fff;color:var(--ink-soft);border-radius:20px;padding:6px 14px;cursor:pointer}
  .chk.paid{background:var(--won);color:#fff;border-color:var(--won)}

  /* mere menu */
  .menu-item{display:flex;justify-content:space-between;align-items:center;padding:15px 16px;cursor:pointer}
  .menu-item+.menu-item{border-top:1px solid var(--paper-line)}
  .menu-item .t{font-family:'Oswald',sans-serif;font-weight:500;font-size:17px;color:var(--ink)}
  .menu-item .a{color:var(--amber-soft);font-size:18px}
  .pwr-card{background:var(--paper);border:1px solid var(--paper-line);border-radius:12px;padding:12px 14px;margin-bottom:10px}
  .pwr-h{font-family:'Oswald',sans-serif;font-weight:600;font-size:16px}
  .pwr-d{font-size:12px;color:var(--ink-soft);margin:2px 0 10px}
  .pwr-targets{display:flex;flex-wrap:wrap;gap:8px}
  @keyframes confFall{to{transform:translateY(108vh) rotate(720deg);opacity:.25}}
  @keyframes revPop{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
  #toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%) translateY(16px);z-index:90;background:#0C1B18;color:#EBEEEA;border:1px solid var(--amber-soft);border-radius:12px;padding:13px 18px;max-width:88%;font-size:13px;line-height:1.5;box-shadow:0 8px 28px rgba(0,0,0,.45);opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:pre-line;text-align:center}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #cmodal{position:fixed;inset:0;z-index:95;background:rgba(12,27,24,.62);display:flex;align-items:center;justify-content:center;padding:28px}
  #cmodal .box{background:var(--paper);color:var(--ink);border-radius:16px;padding:22px;max-width:360px;width:100%;box-shadow:0 14px 44px rgba(0,0,0,.45)}
  #cmodal .msg{font-size:14px;line-height:1.6;margin-bottom:18px;color:var(--ink)}

  /* rules */
  .rule{background:var(--paper);color:var(--ink);border-radius:10px;box-shadow:var(--shadow);padding:15px;margin-bottom:11px}
  .rule h3{font-family:'Oswald',sans-serif;font-weight:600;font-size:16px;text-transform:uppercase;margin-bottom:7px;display:flex;gap:9px;align-items:baseline}
  .rule h3 .n{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--amber-soft);font-weight:700}
  .rule p{font-size:13px;color:#2c3733}

  /* awards reveal */
  .award{background:var(--paper);border-radius:10px;box-shadow:var(--shadow);padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:14px}
  .award .ic{font-size:26px}
  .award .t{font-family:'Oswald',sans-serif;font-weight:600;font-size:17px;color:var(--ink)}
  .award .w{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-soft)}
  .award .w b{color:var(--amber-soft)}
  .award-d{background:var(--paper);border-radius:10px;box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden}
  .award-d summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:14px;padding:14px 16px}
  .award-d summary::-webkit-details-marker{display:none}
  .award-d .ic{font-size:26px}
  .award-d .t{font-family:'Oswald',sans-serif;font-weight:600;font-size:17px;color:var(--ink)}
  .award-d .w{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-soft);margin-top:2px}
  .award-d .chev{color:var(--amber-soft);font-size:22px;transition:transform .2s;flex-shrink:0}
  .award-d[open] .chev{transform:rotate(90deg)}
  .award-info{padding:12px 16px 15px 56px;font-size:13px;color:#2c3733;line-height:1.55;border-top:1px solid var(--paper-line)}

  .empty{padding:28px 18px;text-align:center;color:var(--ink-soft)}
  .empty .big{font-family:'Oswald',sans-serif;font-size:18px;color:var(--ink);text-transform:uppercase;margin-bottom:5px}
  .hint{font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(235,238,234,.4);text-align:center;margin-top:20px;line-height:1.7}
  .admin-note{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--amber);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}

  #loginScreen{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:24px;
    background:radial-gradient(120% 90% at 50% 0%, rgba(243,169,59,.12), transparent 55%), var(--board)}
  #loginScreen .box{width:100%;max-width:360px}
  #loginScreen .badge{width:92px;height:92px;margin:0 auto 18px;border-radius:50%;background:radial-gradient(circle at 32% 26%, #FFEBB0, #F3A93B 45%, #A9701D 100%);
    box-shadow:0 0 0 4px rgba(243,169,59,.16), 0 0 34px 4px rgba(243,169,59,.45), 0 14px 34px -10px rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center}
  #loginScreen .badge svg{width:66%;height:66%;filter:drop-shadow(0 3px 3px rgba(74,46,8,.5))}
  #loginScreen h1{font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:.06em;text-transform:uppercase;font-size:24px;color:var(--paper);text-align:center;margin-bottom:6px;line-height:1.2}
  #loginScreen .sub{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.04em;color:rgba(235,238,234,.55);text-align:center;margin-bottom:26px}
  #loginScreen .paper{border-top:3px solid var(--amber);box-shadow:0 20px 50px -18px rgba(0,0,0,.65)}
  #loginScreen .err{font-size:12px;color:var(--lost);margin:-4px 0 10px;min-height:14px;text-align:center}
  #loginScreen .swap{text-align:center;margin-top:18px;font-size:12px;color:rgba(235,238,234,.55)}
  #loginScreen .swap a{color:var(--amber);cursor:pointer;text-decoration:underline;font-weight:500}
  .who-pill{cursor:pointer}
  .who-pill:active{opacity:.8}

  nav{position:fixed;bottom:0;left:0;right:0;z-index:10;background:rgba(16,38,33,.94);backdrop-filter:blur(10px);border-top:1px solid var(--board-line);display:flex;padding:8px 4px calc(8px + env(safe-area-inset-bottom,0))}
  nav button{flex:1;background:none;border:none;color:rgba(235,238,234,.5);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.03em;text-transform:uppercase;cursor:pointer;padding:4px 2px;display:flex;flex-direction:column;align-items:center;gap:4px;transition:color .15s}
  nav button .ic{font-size:17px;line-height:1}
  nav button.active{color:var(--amber)}

  @media (max-width:430px){.snapshot,.statgrid{grid-template-columns:1fr}}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  :focus-visible{outline:2px solid var(--amber);outline-offset:2px}
</style>
</head>
<body>
  <div id="loginScreen">
    <div class="box">
      <div class="badge">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="crownGradLogin" x1="0%" y1="0%" x2="10%" y2="100%">
              <stop offset="0%" stop-color="#FFF9E6"/><stop offset="35%" stop-color="#FFDD82"/>
              <stop offset="65%" stop-color="#F3A93B"/><stop offset="100%" stop-color="#7A4E14"/>
            </linearGradient>
          </defs>
          <path d="M 15 65 L 13 38 L 30 51 L 38 24 L 50 17 L 62 24 L 70 51 L 87 38 L 85 65 Z"
                fill="url(#crownGradLogin)" stroke="#5C3A0E" stroke-width="3" stroke-linejoin="round"/>
          <rect x="15" y="65" width="70" height="10" rx="2" fill="#DDA53E" stroke="#5C3A0E" stroke-width="3"/>
          <circle cx="13" cy="38" r="5" fill="#4FAE7C" stroke="#5C3A0E" stroke-width="1.5"/>
          <circle cx="50" cy="17" r="6.5" fill="#DD5147" stroke="#5C3A0E" stroke-width="1.5"/>
          <circle cx="87" cy="38" r="5" fill="#4FAE7C" stroke="#5C3A0E" stroke-width="1.5"/>
        </svg>
      </div>
      <h1>Rona Defence League</h1>
      <div class="sub" id="loginSub">Log ind med din klub-konto</div>
      <div class="paper pad">
        <div class="field"><label class="fld">E-mail</label><input type="email" id="loginEmail" autocomplete="username" placeholder="din@mail.dk"></div>

function metaOf(fs){ return {players:fs.players, inactivePlayers:fs.inactivePlayers, season:fs.season, monthlyFee:fs.monthlyFee, balanceAdj:fs.balanceAdj, nicks:fs.nicks}; }
let unsubList=[];

function startSync(){

    function docSync(ref,key,apply){
      unsubList.push(ref.onSnapshot(async snap=>{

/* =================== DISCIPLINE ENGINE =================== */
function obligation(player, met, reason){
  const p=S.disc.players[player];
  if(met){
    p.streak++;
    if(p.yellow && p.streak>=3){ p.yellow=false; p.streak=0; S.disc.log.push({ts:Date.now(),player,event:"renset",reason:"3 rene forpligtelser"}); }
  } else {
    if(p.yellow){ p.yellow=false; p.streak=0; p.reds++; S.fines.push({id:'f'+Date.now()+Math.floor(Math.random()*1000),player,kind:"rødt",amount:25,paid:false,dueMonth:upcomingPayMonth(),ts:Date.now()}); S.disc.log.push({ts:Date.now(),player,event:"rødt",reason}); }
    else { p.yellow=true; p.streak=0; S.disc.log.push({ts:Date.now(),player,event:"gult",reason}); }
  }
}
function cardIcon(p){ if(p.yellow)return "🟨"; if(p.reds>0)return "🟥"; return "✓"; }

/* =================== STATS =================== */
function settledRounds(){ return S.rounds.filter(r=>r.status==='settled'); }
function isCounting(p){ return p && p.hit!=='void'; }   // void-ben fjernes helt fra al statistik
function allPicksOf(name){ const out=[]; for(const r of settledRounds()){ const p=r.picks[name]; if(isCounting(p)) out.push(p);} return out; }
function statsFor(name){
  const ps=allPicksOf(name); let hits=0,sumHit=0,best=0,exp=0,clvN=0,clvSum=0;
  for(const p of ps){ exp+=1/p.odds; if(p.hit){hits++;sumHit+=p.odds;if(p.odds>best)best=p.odds;}
    if(p.closing){ clvN++; clvSum+=(p.odds/p.closing-1)*100; } }
  const picks=ps.length;
  return {picks,hits,sumHit,best,hitrate:picks?hits/picks:0,tb:picks?sumHit/picks*100:0,
    yield:picks?(sumHit-picks)/picks*100:0,net:sumHit-picks,exp,luck:hits-exp,
    clv:clvN?clvSum/clvN:null};
}
function longestStreak(name){
  let cur=0,max=0;
  for(const r of settledRounds()){const p=r.picks[name];if(!isCounting(p))continue;if(p.hit){cur++;if(cur>max)max=cur;}else cur=0;}
  return max;
}
function aggBy(field,filterName){
  const a={};
  for(const r of settledRounds())for(const n of PLAYERS){ if(filterName&&n!==filterName)continue;
    const p=r.picks[n]; if(!isCounting(p))continue; const k=p[field]||"Andet";
    (a[k]||=(a[k]={picks:0,hits:0,sumHit:0})); a[k].picks++; if(p.hit){a[k].hits++;a[k].sumHit+=p.odds;} }
  return a;
}
function oddsBand(o){
  if(o<=1.10)return "≤ 1,10";
  if(o<=1.25)return "1,11–1,25";
  if(o<=1.40)return "1,26–1,40";
  if(o<=1.60)return "1,41–1,60";
  if(o<=2.00)return "1,61–2,00";
  if(o<=3.00)return "2,01–3,00";
  if(o<=5.00)return "3,01–5,00";
  return "Over 5,00";
}
function aggBand(filterName){
  const a={};
  for(const r of settledRounds())for(const n of PLAYERS){ if(filterName&&n!==filterName)continue;
    const p=r.picks[n]; if(!isCounting(p))continue; const k=oddsBand(p.odds);
    (a[k]||=(a[k]={picks:0,hits:0})); a[k].picks++; if(p.hit)a[k].hits++; }
  return a;
}
function anchorCount(name){
  let c=0;
  for(const r of settledRounds()){ const mine=r.picks[name]; if(!isCounting(mine)||mine.hit)continue;
    const others=PLAYERS.filter(x=>x!==name&&isCounting(r.picks[x]));
    if(others.length && others.every(x=>r.picks[x].hit)) c++; }
  return c;
}
function carryCount(name){
  let c=0;
  for(const r of settledRounds()){ const subs=PLAYERS.filter(x=>isCounting(r.picks[x]));
    if(!subs.length || !subs.every(x=>r.picks[x].hit))continue;
    let top=null,topO=-1; subs.forEach(x=>{if(r.picks[x].odds>topO){topO=r.picks[x].odds;top=x;}});
    if(top===name)c++; }
  return c;
}
function monthStats(rs){
  const s={}; PLAYERS.forEach(n=>{let h=0,p=0,sum=0,best=0;rs.forEach(r=>{const x=r.picks[n];if(isCounting(x)){p++;if(x.hit){h++;sum+=x.odds;if(x.odds>best)best=x.odds;}}});s[n]={p,hr:p?h/p:0,tb:p?sum/p*100:0,net:sum-p,best};});
  return s;
}
function monthAdj(monthKey, rawPts){
  const adj={}; PLAYERS.forEach(n=>adj[n]=0);
  const rounds=S.rounds.filter(r=>r.date.slice(0,7)===monthKey && r.status!=='open');
  rounds.forEach(r=>{
    // Skjold gælder kun angreb meldt i SAMME runde — derfor nulstilles det pr. runde, ikke pr. måned.
    const shield={}; PLAYERS.forEach(n=>shield[n]=0);
    (r.powers||[]).forEach(p=>{ if(p.type==='skjold')shield[p.by]=(shield[p.by]||0)+1; });
    (r.powers||[]).forEach(p=>{
      if(p.type==='boost') adj[p.by]+=2;
      else if(p.type==='sabotage'){ if(shield[p.target]>0)shield[p.target]--; else if(adj[p.target]!=null)adj[p.target]-=2; }
      else if(p.type==='tyveri'){ if(!(rawPts&&rawPts[p.target]>0))return;   // offeret har 0 point — intet at stjæle, too bad
        if(shield[p.target]>0)shield[p.target]--; else if(adj[p.target]!=null){adj[p.target]-=1;adj[p.by]+=1;} }
    });
  });
  return adj;
}
function monthFrikendt(monthKey){
  const set=new Set();
  S.rounds.filter(r=>r.date.slice(0,7)===monthKey && r.status!=='open').forEach(r=>(r.powers||[]).forEach(p=>{ if(p.type==='frikendelse')set.add(p.by); }));
  return set;
}
function rankAmong(elig,s,key){const slots=PLAYERS.map((_,i)=>PLAYERS.length-1-i);const sorted=[...elig].sort((a,b)=>s[b][key]-s[a][key]);const o={};let i=0;
  while(i<sorted.length){let j=i;while(j<sorted.length&&s[sorted[j]][key]===s[sorted[i]][key])j++;const sh=slots.slice(i,j).reduce((x,y)=>x+(y||0),0)/(j-i);for(let k=i;k<j;k++)o[sorted[k]]=sh;i=j;}return o;}
function roundRaw(r){   // ren placering pr. runde: 0/1/2/3 — taber & ikke-spillet = 0, ellers rangeret efter odds. Lægges altid oven i, trækkes aldrig fra.
  const out={}; PLAYERS.forEach(n=>out[n]=0);
  const players=PLAYERS.filter(n=>isCounting(r.picks[n])); if(!players.length)return out;
  if(players.length===1){ const n=players[0]; out[n]=r.picks[n].hit?1:0; return out; }
  const key=n=>r.picks[n].hit?r.picks[n].odds:-1;   // vundet → sorter efter odds; tabt → i bund
  const k=players.length; const sorted=[...players].sort((a,b)=>key(b)-key(a));
  let i=0;
  while(i<sorted.length){ let j=i; while(j<sorted.length&&key(sorted[j])===key(sorted[i]))j++;
    const slots=[]; for(let q=i;q<j;q++)slots.push(k-1-q); const avg=slots.reduce((a,b)=>a+b,0)/slots.length;
    for(let q=i;q<j;q++) out[sorted[q]] = r.picks[sorted[q]].hit ? avg : 0;   // tabere tvinges til 0 (deler aldrig point)
    i=j; }
  return out;}
function monthPoints(rs){
  const s=monthStats(rs); const elig=PLAYERS.filter(n=>s[n].p>=1);
  const raw={}; PLAYERS.forEach(n=>raw[n]=0);
  rs.forEach(r=>{ if(r.status==='open')return; const rp=roundRaw(r); PLAYERS.forEach(n=>raw[n]+=rp[n]); });
  const mk=rs.length?rs[0].date.slice(0,7):null; const adj=mk?monthAdj(mk,raw):{};
  const pts={}; PLAYERS.forEach(n=>pts[n]=raw[n]+(adj[n]||0));   // pts = med power-ups (kun til månedens taber)
  return {pts,raw,elig,s,adj};
}
function leaguePoints(){   // SÆSONTABEL = rå point (power-ups påvirker IKKE tabellen, kun månedens taber)
  const lg={};PLAYERS.forEach(n=>lg[n]=0);
  const byMonth={}; settledRounds().forEach(r=>{(byMonth[r.date.slice(0,7)]||=[]).push(r);});
  Object.values(byMonth).forEach(rs=>{ const {raw}=monthPoints(rs); PLAYERS.forEach(n=>lg[n]+=(raw[n]||0)); });
  return lg;
}
function monthLosers(rs){   // bruger den manipulerede stilling; bøden afgøres på de rå tal
  const {pts,elig,s}=monthPoints(rs);
  const played=PLAYERS.filter(n=>s[n].p>=1);
  const noShow=PLAYERS.filter(n=>s[n].p===0);
  // Spillede nogen, men ikke alle? → de(n) der slet ikke spillede måneden er taber(e) (25 kr)
  if(noShow.length && played.length) return noShow.map(n=>({name:n, penalty:25}));
  if(elig.length<2)return [];
  const worst=[...elig].sort((a,b)=> pts[a]-pts[b] || s[a].tb-s[b].tb || s[a].hr-s[b].hr || s[a].net-s[b].net)[0];
  const group=elig.filter(n=> pts[n]===pts[worst] && s[n].tb===s[worst].tb && s[n].hr===s[worst].hr && s[n].net===s[worst].net);
  return group.map(n=>({name:n, penalty: s[n].tb<100?50:25}));
}
function currentMonthLosers(){
  const rs=settledRounds(); if(!rs.length)return null;
  const months=[...new Set(rs.map(r=>r.date.slice(0,7)))].sort();
  const last=months[months.length-1]; const losers=monthLosers(rs.filter(r=>r.date.slice(0,7)===last));
  return losers.length?{losers,month:last}:null;
}
function bigHits(name){ return allPicksOf(name).filter(p=>p.hit&&p.odds>=3).length; }
function seasonRanked(){   // bedst→dårligst via 5-trins rangstige
  const lg=leaguePoints(); const s={}; PLAYERS.forEach(n=>s[n]=statsFor(n));
  return [...PLAYERS].sort((a,b)=> lg[b]-lg[a] || s[b].tb-s[a].tb || s[b].hitrate-s[a].hitrate || s[b].net-s[a].net || bigHits(b)-bigHits(a));
}
function seasonRanks(){   // delt placering når to står HELT lige på alle trin (symmetrisk top og bund)
  const order=seasonRanked(); const lg=leaguePoints(); const s={}; PLAYERS.forEach(n=>s[n]=statsFor(n));
  const same=(a,b)=> lg[a]===lg[b] && s[a].tb===s[b].tb && s[a].hitrate===s[b].hitrate && s[a].net===s[b].net && bigHits(a)===bigHits(b);
  const ranks={}; let rank=1;
  order.forEach((n,i)=>{ if(i>0 && !same(order[i-1],n)) rank=i+1; ranks[n]=rank; });
  return {order, ranks, same};
}
// Samme rangstige som seasonRanks(), men for en vilkårlig delmængde af afgjorte runder —
// bruges kun til at se, hvor nogen lå FØR seneste runde (placerings-pile).
function leaguePointsForRounds(rs){
  const lg={}; PLAYERS.forEach(n=>lg[n]=0);
  const byMonth={}; rs.forEach(r=>(byMonth[r.date.slice(0,7)]||=[]).push(r));
  Object.values(byMonth).forEach(ms=>{ const {raw}=monthPoints(ms); PLAYERS.forEach(n=>lg[n]+=(raw[n]||0)); });
  return lg;
}
function statsForRounds(name, rs){
  let hits=0,sumHit=0,picks=0;
  rs.forEach(r=>{ const p=r.picks[name]; if(!isCounting(p))return; picks++; if(p.hit){hits++;sumHit+=p.odds;} });
  return {picks,hitrate:picks?hits/picks:0,tb:picks?sumHit/picks*100:0,net:sumHit-picks};
}
function bigHitsForRounds(name, rs){ return rs.filter(r=>{const p=r.picks[name];return p&&isCounting(p)&&p.hit&&p.odds>=3;}).length; }
function seasonRanksForRounds(rs){
  const lg=leaguePointsForRounds(rs); const s={}; PLAYERS.forEach(n=>s[n]=statsForRounds(n,rs));
  const order=[...PLAYERS].sort((a,b)=> lg[b]-lg[a] || s[b].tb-s[a].tb || s[b].hitrate-s[a].hitrate || s[b].net-s[a].net || bigHitsForRounds(b,rs)-bigHitsForRounds(a,rs));
  const same=(a,b)=> lg[a]===lg[b] && s[a].tb===s[b].tb && s[a].hitrate===s[b].hitrate && s[a].net===s[b].net && bigHitsForRounds(a,rs)===bigHitsForRounds(b,rs);
  const ranks={}; let rank=1;
  order.forEach((n,i)=>{ if(i>0 && !same(order[i-1],n)) rank=i+1; ranks[n]=rank; });
  return {order, ranks};
}
function rankArrows(){   // placering nu vs. placering før seneste afgjorte runde
  const rs=settledRounds().slice().sort((a,b)=>a.date.localeCompare(b.date)||a.id-b.id);
  if(rs.length<2) return {};
  const {ranks:prev}=seasonRanksForRounds(rs.slice(0,-1));
  const {ranks:cur}=seasonRanksForRounds(rs);
  const out={}; PLAYERS.forEach(n=>{ const d=prev[n]-cur[n]; out[n]= d>0?'up':d<0?'down':'same'; });
  return out;
}
// Formkurve: seneste N afgjorte runders resultat for en spiller — ✓/✗/∅/– (ikke spillet).
function formGuide(name, n){
  n=n||5;
  const rs=settledRounds().slice().sort((a,b)=>a.date.localeCompare(b.date)||a.id-b.id).slice(-n);
  return rs.map(r=>{ const p=r.picks[name];
    if(!p) return {t:'–',c:'na'};
    if(p.hit==='void') return {t:'∅',c:'void'};
    return p.hit ? {t:'✓',c:'win'} : {t:'✗',c:'loss'};
  });
}
function couponNet(r){
  if(!r.stake)return 0;
  if(r.payoutOverride!=null) return r.payoutOverride - r.stake;   // admin har sat faktisk udbetaling (fx odds-boost)
  const legs=PLAYERS.filter(n=>isCounting(r.picks[n])); if(!legs.length)return 0;
  const won=legs.every(n=>r.picks[n].hit);
  let ret=0; if(won){let comb=1;legs.forEach(n=>comb*=r.picks[n].odds);ret=r.stake*comb;}
  return ret-r.stake;
}
function couponOdds(r){ const legs=PLAYERS.filter(n=>isCounting(r.picks[n])); let c=1; legs.forEach(n=>c*=r.picks[n].odds); return legs.length?c:0; }
function finesTotal(){ return S.fines.reduce((a,f)=>a+f.amount,0); }
function poolTotal(){
  const byMonth={}; settledRounds().forEach(r=>{(byMonth[r.date.slice(0,7)]||=[]).push(r);});
  let net=0; settledRounds().forEach(r=>net+=couponNet(r));
  return Object.keys(byMonth).length*fee()*PLAYERS.length + finesTotal() + net + (S.balanceAdj||0);
}
function contributions(){
  const c={}; PLAYERS.forEach(n=>c[n]={paid:0,owed:0});
  payMonths().forEach(key=>{const pm=S.payments[key]||{};
    PLAYERS.forEach(n=>{ if(pm['fee_'+n])c[n].paid+=fee(); else c[n].owed+=fee(); }); });
  S.fines.forEach(f=>{ if(f.paid)c[f.player].paid+=f.amount; else c[f.player].owed+=f.amount; });
  return c;
}

/* =================== AWARDS =================== */
function computeAwards(){
  const rs=settledRounds(); const out=[];
  const st={}; PLAYERS.forEach(n=>st[n]=statsFor(n));
  const withPicks=PLAYERS.filter(n=>st[n].picks>0);
  if(!withPicks.length) return out;
  const tiedTop=(pool,fn)=>{ let best=-Infinity; pool.forEach(n=>{const v=fn(n);if(v>best)best=v;}); return {winners:pool.filter(n=>fn(n)===best),val:best}; };
  const names=ws=>ws.map(nameOf).join(" & ");
  const add=(pool,fn,label,icon,fmt,info,minVal)=>{ const {winners,val}=tiedTop(pool,fn); if(minVal!=null&&val<=minVal)return; out.push({icon,t:label,w:`${names(winners)} · ${fmt(val,winners[0])}`,info}); };
  add(withPicks,n=>st[n].hitrate,"The Sniper","🎯",(v)=>`${Math.round(v*100)}% hitrate`,"Højeste hitrate — den der oftest rammer sine spil. Antal rigtige delt med antal spil. Deles ved nøjagtig lighed.");
  add(withPicks,n=>st[n].yield,"Value Merchant","💎",(v)=>`${v>=0?'+':''}${Math.round(v)}% yield`,"Højeste yield — mest profit pr. indsat enhed. Belønner værdi frem for sikre favoritter. Yield = TB% minus 100.");
  add(withPicks,n=>st[n].luck,"Lucky Devil","🍀",(v)=>`+${v.toFixed(1)} over forventet`,"Størst positivt held — ramte flere end oddsene tilsagde. Forventede rigtige = summen af 1/odds; held = faktiske minus forventede.");
  add(withPicks,n=>-st[n].luck,"Cold as Ice","🧊",(v)=>`${(-v).toFixed(1)} under forventet`,"Størst uheld — ramte færre end oddsene tilsagde. Deles gerne: »I er begge sæsonens kolde hunde«.");
  add(withPicks,n=>bigHits(n),"Giant Killer","🗡️",(v)=>`${v} ramt over 3,0`,"Flest ramte spil med odds 3,0 eller højere — kongen af de store overraskelser.",0);
  add(withPicks,n=>longestStreak(n),"Iron Man","🛡️",(v)=>`${v} i træk`,"Længste stime af rigtige spil i træk hen over sæsonen.",0);
  add(withPicks,n=>anchorCount(n),"The Anchor","⚓",(v)=>`dræbte ${v} kuponer`,"Dræbte flest kuponer — runder hvor man selv missede, mens ALLE andre ramte. Vandrepokal med skam — deles gerne.",0);
  const clvPool=withPicks.filter(n=>st[n].clv!=null);
  if(clvPool.length) add(clvPool,n=>st[n].clv,"The Closer","📈",(v)=>`${v>=0?'+':''}${v.toFixed(1)}% CLV`,"Bedste CLV — fik i snit bedre odds end markedets slutodds. Det tal proffer stoler mest på.");
  let bestC=null,bestO=0,nearC=null,nearWho=null,worstC=null,worstO=Infinity;
  rs.forEach(r=>{const subs=PLAYERS.filter(x=>isCounting(r.picks[x]));if(!subs.length)return;let comb=1;subs.forEach(x=>comb*=r.picks[x].odds);
    const won=subs.every(x=>r.picks[x].hit);
    if(won&&comb>bestO){bestO=comb;bestC=r;}
    if(!won&&comb<worstO){worstO=comb;worstC=r;}
    const misses=subs.filter(x=>!r.picks[x].hit);
    if(misses.length===1&&subs.length>=3){nearC=r;nearWho=misses[0];}});
  if(bestC) out.push({icon:"🏆",t:"Bedste kupon",w:`${fmtDate(bestC.date)} · samlet ${bestO.toFixed(2)}`,info:"Sæsonens flotteste hit: den vundne kupon med de højeste samlede odds."});
  if(nearC) out.push({icon:"😤",t:"Så tæt på",w:`${fmtDate(nearC.date)} · ${nameOf(nearWho)} missede den ene`,info:"Kuponen hvor kun én mand missede — så tæt på fuld plade."});
  if(worstC) out.push({icon:"🤡",t:"Årets ringeste kupon",w:`${fmtDate(worstC.date)} · kun ${worstO.toFixed(2)} i samlet odds`,info:"Den tabte kupon med de laveste samlede odds — så tæt på en sikker ting, og alligevel gik den ned."});
  let dCur=0,dMax=0; rs.slice().sort((a,b)=>a.date.localeCompare(b.date)||a.id-b.id).forEach(r=>{const subs=PLAYERS.filter(x=>isCounting(r.picks[x]));if(!subs.length)return;if(subs.every(x=>r.picks[x].hit))dCur=0;else{dCur++;if(dCur>dMax)dMax=dCur;}});
  if(dMax>=2) out.push({icon:"🏜️",t:"Tørke-rekorden",w:`${dMax} kuponer i træk uden gevinst`,info:"Klubbens længste tørke — flest tabte kuponer i streg hen over sæsonen."});
  let specEdge=0.0001,specWho=null,specCat=null,specHr=0;
  withPicks.forEach(n=>{ const overall=st[n].hitrate;
    ['sport','betType'].forEach(field=>{ const a=aggBy(field,n);
      for(const k in a){ if(a[k].picks>=4){ const hr=a[k].hits/a[k].picks; if(hr-overall>specEdge){ specEdge=hr-overall; specWho=n; specCat=k; specHr=hr; } } } }); });
  if(specWho) out.push({icon:"🎓",t:"The Specialist",w:`${nameOf(specWho)} · ${specCat} ${Math.round(specHr*100)}%`,info:"Størst overtag i én enkelt niche — markant bedre i én sportsgren eller spiltype end ellers (mindst 4 spil)."});
  const cm=[...new Set(rs.map(r=>r.date.slice(0,7)))].sort();
  if(cm.length>=2){ const rankAt=cm.map(mEnd=>{ const lg={}; PLAYERS.forEach(n=>lg[n]=0); const byM={}; rs.filter(r=>r.date.slice(0,7)<=mEnd).forEach(r=>(byM[r.date.slice(0,7)]||=[]).push(r)); Object.values(byM).forEach(mr=>{const {raw,elig}=monthPoints(mr);elig.forEach(n=>lg[n]+=raw[n]);}); const order=[...PLAYERS].sort((a,b)=>lg[b]-lg[a]); const rk={}; order.forEach((n,i)=>rk[n]=i+1); return rk; });
    let bestClimb=0,climbWho=null,climbMi=0; for(let i=1;i<rankAt.length;i++){ PLAYERS.forEach(n=>{ const gain=(rankAt[i-1][n]||PLAYERS.length)-(rankAt[i][n]||PLAYERS.length); if(gain>bestClimb){bestClimb=gain;climbWho=n;climbMi=i;} }); }
    if(climbWho) out.push({icon:"📈",t:"Comeback-måneden",w:`${nameOf(climbWho)} · +${bestClimb} pladser i ${MONTHS_DA[+cm[climbMi].slice(5,7)-1]}`,info:"Største spring opad i sæsontabellen fra én måned til den næste — den vildeste optur."});
  }
  return out;
}

/* =================== HELPERS =================== */
function fmtDate(iso){const[y,m,d]=iso.split('-');return `${d}.${m}.${y}`;}
function isAdmin(){return S.user===ADMIN;}
function nameOf(n){ const nk=S.nicks&&S.nicks[n]; return nk?`${nk} (${n})`:n; }
function isActivePlayer(n){ return !(S.inactivePlayers||[]).includes(n); }
function shortName(n){ return (S.nicks&&S.nicks[n])||n; }
function openRound(){return S.rounds.find(r=>r.status!=='settled');}
function payMonths(){ const s=new Set(settledRounds().map(r=>r.date.slice(0,7))); const op=openRound(); if(op)s.add(op.date.slice(0,7)); return [...s]; }
function nextMonthKey(key){ let[y,m]=key.split('-').map(Number); m++; if(m>12){m=1;y++;} return y+'-'+String(m).padStart(2,'0'); }
function upcomingPayMonth(){ const op=openRound(); if(op)return op.date.slice(0,7); const ms=[...new Set(settledRounds().map(r=>r.date.slice(0,7)))].sort(); return ms.length?nextMonthKey(ms[ms.length-1]):new Date().toISOString().slice(0,7); }
function unpaidFinesFor(n,monthKey){ return S.fines.filter(f=>f.player===n && !f.paid && (monthKey?f.dueMonth===monthKey:true)); }
function roundNo(r){ if(!r)return 0; return S.rounds.slice().sort((a,b)=>a.date.localeCompare(b.date)||a.id-b.id).findIndex(x=>x.id===r.id)+1; }
function combOdds(r){let c=1;PLAYERS.forEach(n=>{if(r.picks[n])c*=r.picks[n].odds;});return c;}
function nthSat(y,m0,n){ const d=new Date(Date.UTC(y,m0,1)); let c=0; while(true){ if(d.getUTCDay()===6){c++; if(c===n)return d.toISOString().slice(0,10);} d.setUTCDate(d.getUTCDate()+1);} }
function nextScheduled(refISO,inclusive){
  const base=new Date(refISO+"T00:00:00Z"); let y=base.getUTCFullYear(),m=base.getUTCMonth();
  for(let i=0;i<6;i++){ for(const s of [nthSat(y,m,1),nthSat(y,m,3)]){ if(inclusive? s>=refISO : s>refISO) return s; } m++; if(m>11){m=0;y++;} }
  return null;
}
function satWhich(iso){ const d=new Date(iso+"T00:00:00Z"),y=d.getUTCFullYear(),m=d.getUTCMonth();
  if(iso===nthSat(y,m,1))return "1. lørdag"; if(iso===nthSat(y,m,3))return "3. lørdag"; return ""; }
function deadlineText(iso){ const w=satWhich(iso); const[Y,M,D]=iso.split('-'); return `${w?w+' · ':''}lør ${+D}/${+M} kl. 10`; }
function seasonStartDate(){ const today=new Date().toISOString().slice(0,10); const y=+today.slice(0,4); const sep=nthSat(y,8,1); return today<=sep?sep:nthSat(y+1,8,1); }   // udgangspunkt: 1. lørdag i september
async function ensureOpenRound(){
  if(S.season&&S.season.ended)return false;   // afsluttet sæson åbner ikke nye runder
  if(openRound())return false;
  const last=S.rounds.slice().sort((a,b)=>b.date.localeCompare(a.date))[0];
  const date=last?nextScheduled(last.date,false):seasonStartDate();   // ny sæson: første runde = næste planlagte lørdag fra i dag
  if(!date)return false;
  const nr={id:date,date,status:'open',picks:{},absent:[]}; S.rounds.push(nr); await saveRound(nr); return true;
}
async function openNextRound(){ await ensureOpenRound(); renderAll(); go('round'); }
function slipHTML(r){

      <span class="odds">${p.odds.toFixed(2)}</span><span class="tick ${v?'p':p.hit?'w':'l'}">${v?'∅':p.hit?'✓':'✗'}</span></div>`;}).join('')}
    <div class="slip-foot"><span>${legs.length===1?'Single':legs.length+'-ling'} · samlet odds <b>${comb.toFixed(2)}</b></span>${r.stake?`<span>${r.stake} kr → <b style="color:${net>=0?'var(--won)':'var(--lost)'}">${net>=0?'+':''}${net.toFixed(0)} kr</b></span>`:''}</div>

// Tegner kuponen som et billede (canvas — ingen eksterne libs), til deling i fx Messenger.
function couponCanvas(r){
  const subs=PLAYERS.filter(n=>r.picks[n]);
  const legs=subs.filter(n=>isCounting(r.picks[n]));
  const won=legs.length&&legs.every(n=>r.picks[n].hit);
  const net=couponNet(r);
  const W=720, PAD=36, HEADH=118, LEGH=94, FOOTH=110;
  const H=HEADH+subs.length*LEGH+FOOTH+PAD;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const ctx=cv.getContext('2d');
  function roundRect(x,y,w,h,rad){ ctx.beginPath(); ctx.moveTo(x+rad,y); ctx.arcTo(x+w,y,x+w,y+h,rad); ctx.arcTo(x+w,y+h,x,y+h,rad); ctx.arcTo(x,y+h,x,y,rad); ctx.arcTo(x,y,x+w,y,rad); ctx.closePath(); }
  ctx.fillStyle='#0C1B18'; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(243,169,59,.35)'; ctx.lineWidth=3; ctx.strokeRect(6,6,W-12,H-12);
  ctx.textAlign='left';
  ctx.fillStyle='#F3A93B'; ctx.font='700 15px Oswald, Arial, sans-serif';
  ctx.fillText('RONA DEFENCE LEAGUE', PAD, PAD+16);
  ctx.fillStyle='#EBEEEA'; ctx.font='700 30px Oswald, Arial, sans-serif';
  ctx.fillText('Runde '+roundNo(r)+' · '+fmtDate(r.date), PAD, PAD+56);
  ctx.fillStyle='rgba(235,238,234,.6)'; ctx.font='13px "JetBrains Mono", monospace';
  ctx.fillText((legs.length===1?'Single':legs.length+'-ling')+' · samlet odds '+couponOdds(r).toFixed(2), PAD, PAD+80);
  let y=HEADH+PAD*0.4;
  subs.forEach(n=>{
    const p=r.picks[n]; const v=p.hit==='void';
    ctx.fillStyle='#EBEEEA'; roundRect(PAD,y,W-PAD*2,LEGH-16,12); ctx.fill();
    ctx.fillStyle='#131B18'; ctx.font='700 19px Oswald, Arial, sans-serif'; ctx.textAlign='left';
    ctx.fillText(nameOf(n), PAD+20, y+34);
    ctx.fillStyle='#5B665F'; ctx.font='13px "JetBrains Mono", monospace';
    ctx.fillText((p.desc+' · '+p.sport).slice(0,54), PAD+20, y+56);
    ctx.fillStyle='#5B665F'; ctx.font='700 15px "JetBrains Mono", monospace'; ctx.textAlign='right';
    ctx.fillText(p.odds.toFixed(2), W-PAD-46, y+40);
    ctx.font='700 30px Arial, sans-serif';
    ctx.fillStyle= v?'#C98B2E':p.hit?'#2FA56C':'#DD5147';
    ctx.fillText(v?'∅':p.hit?'✓':'✗', W-PAD-16, y+48);
    y+=LEGH;
  });
  ctx.textAlign='center';
  ctx.fillStyle=won?'#2FA56C':'#DD5147'; ctx.font='700 38px Oswald, Arial, sans-serif';
  ctx.fillText(won?'VANDT! 🎉':'TABT', W/2, y+48);
  if(r.stake){ ctx.fillStyle='#EBEEEA'; ctx.font='700 18px "JetBrains Mono", monospace';
    ctx.fillText((net>=0?'+':'')+net.toFixed(0)+' kr · '+r.stake+' kr indsat', W/2, y+80); }
  return cv;
}
function shareCoupon(roundId){
  const r=S.rounds.find(x=>x.id===roundId); if(!r)return;
  const cv=couponCanvas(r);
  cv.toBlob(async blob=>{
    if(!blob){ toast('Kunne ikke lave billedet — prøv igen.'); return; }
    const file=new File([blob], 'rona-runde-'+roundNo(r)+'.png', {type:'image/png'});
    try{
      if(navigator.canShare && navigator.canShare({files:[file]})){
        await navigator.share({files:[file], title:'Rona Defence League', text:'Runde '+roundNo(r)});
        return;
      }
    }catch(e){ if(e && e.name==='AbortError') return; }
    const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=file.name;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 4000);
    toast('Billedet er downloadet — del det i Messenger 📎');
  }, 'image/png');
}

/* =================== FORM STATE (submission) =================== */
let F=null;
function resetF(){F={match:null,market:null,side:null,line:"",odds:"",free:"",ouUnit:""};}
function descOf(){
  if(!F.match||!F.market)return "";
  const m=F.match, mk=F.market, side=F.side, line=F.line;
  if(mk==="Andet (skriv selv)") return (F.free||"").trim();
  if(mk==="Over/Under"){ return side&&line!==""&&F.ouUnit?`${side} ${line} ${F.ouUnit}`:""; }
  if(mk.startsWith("Over/Under")){ const unit=mk.includes("mål")?" mål":mk.includes("hjørner")?" hjørner":mk.includes("kort")?" kort":mk.includes("point")?" point":mk.includes("maps")?" maps":mk.includes("sæt")?" sæt":mk.includes("partier")?" partier":mk.includes("skud")?" skud":""; return side&&line?`${side} ${line}${unit}`:""; }
  if(mk==="Asian handicap"||mk==="Europæisk handicap"||mk==="Handicap"){ const team=side==="home"?m.home:m.away; return team&&line!==""?`${team} ${(+line>0?'+':'')}${line}`:""; }
  if(mk==="Begge hold scorer"){ return side?`Begge scorer: ${side}`:""; }
  if(mk==="1X2 (Moneyline)"){ return side==="1"?m.home:side==="X"?"Uafgjort":side==="2"?m.away:""; }
  if(mk==="Dobbeltchance"){ return side==="1X"?`${m.home} / uafgjort`:side==="12"?`${m.home} / ${m.away}`:side==="X2"?`Uafgjort / ${m.away}`:""; }
  // winner-type
  if(side==="home")return m.home; if(side==="away")return m.away; return side||"";
}
function formReady(){ if(!(F.match&&F.market&&F.side&&parseFloat(F.odds)>1))return false; if(needsLine(F.market)&&F.line==="")return false; if(F.market==="Over/Under"&&!F.ouUnit)return false; return true; }
function needsLine(mk){ return mk&&(mk.startsWith("Over/Under")||mk.includes("handicap")||mk==="Handicap"); }
function sideOptions(mk,m){
  if(!mk)return [];
  if(mk==="1X2 (Moneyline)")return [["1","1 ("+m.home+")"],["X","X"],["2","2 ("+m.away+")"]];
  if(mk==="Dobbeltchance")return [["1X","1X"],["12","12"],["X2","X2"]];
  if(mk==="Begge hold scorer")return [["Ja","Ja"],["Nej","Nej"]];
  if(mk.startsWith("Over/Under"))return [["Over","Over"],["Under","Under"]];
  if(mk==="Asian handicap"||mk==="Europæisk handicap"||mk==="Handicap")return [["home",m.home],["away",m.away]];
  return [["home",m.home],["away",m.away]]; // winner types
}

function seasonTable(){
  const lg=leaguePoints(); const s={};PLAYERS.forEach(n=>s[n]=statsFor(n));
  const {order,ranks}=seasonRanks();
  const arrows=rankArrows();
  const arrowHTML=a=>a==='up'?'<span style="color:var(--won)">▲</span>':a==='down'?'<span style="color:var(--lost)">▼</span>':a==='same'?'<span style="color:var(--ink-soft)">—</span>':'';
  const formColor={win:'var(--won)',loss:'var(--lost)',void:'var(--amber-soft)',na:'var(--ink-soft)'};
  const formHTML=n=>formGuide(n).map(x=>`<span style="color:${formColor[x.c]}">${x.t}</span>`).join(' ');
  return `<table><tr><th>Spiller</th><th>Point</th><th>Hit%</th><th>TB%</th><th>Netto</th></tr>
    ${order.map((n)=>`<tr class="${ranks[n]===1?'lead':''}"><td><span class="rankbadge">${ranks[n]}.</span>${arrowHTML(arrows[n])} ${nameOf(n)}<div style="font-size:11px;letter-spacing:2px;margin-top:4px">${formHTML(n)}</div></td>
      <td class="pts">${lg[n]%1?lg[n].toFixed(1):lg[n]}</td><td>${Math.round(s[n].hitrate*100)}%</td>
      <td>${Math.round(s[n].tb)}%</td><td>${s[n].net>=0?'+':''}${s[n].net.toFixed(2)}</td></tr>`).join('')}</table>`;
}

    return;
  }
  const me=S.user; const myPick=r.picks[me]; const subs=PLAYERS.filter(n=>r.picks[n]).length;

  if(r.status==='open'){
    if(r.absent.includes(me)){

    } else if(myPick){

        <div style="font-family:'JetBrains Mono';font-size:13px;color:var(--ink-soft);margin-top:4px">${myPick.home}${myPick.away?" – "+myPick.away:""} · ${myPick.league} · odds ${myPick.odds.toFixed(2)}</div>
        <div class="btn-row" style="margin-top:12px"><button class="btn btn-ghost" onclick="clearPick()">Ret mit spil</button></div></div>`;
    } else {
      body+=renderSubmitForm(me);

    }
  }
  // submissions overview
  body+=`<div class="paper" style="margin-bottom:14px">
    <div class="status-line" style="padding:12px 16px 6px">Indsendt: ${subs}/${PLAYERS.length} ${r.status!=='open'?'· LÅST':''}</div>
    ${PLAYERS.map(n=>{const p=r.picks[n];const ab=r.absent.includes(n);const canToggle=r.status==='open'&&(isAdmin()||n===S.user);
      return `<div class="sub-row"><div><div class="nm">${nameOf(n)}${n===me?' (dig)':''}</div>${ab?'<div class="desc">Afbud / fravær</div>':p?`<div class="desc">${p.desc} · ${p.sport}</div>`:'<div class="desc">—</div>'}</div>
      <div style="display:flex;align-items:center;gap:8px">${ab?'<span class="badge b-wait" style="color:var(--amber-soft)">afbud</span>':p?`<span class="badge b-odds">${p.odds.toFixed(2)}</span>`:'<span class="badge b-wait">mangler</span>'}
      ${canToggle&&!p?`<button class="chk" style="padding:4px 10px" onclick="toggleAfbud('${n}')">${ab?'tilbage':'afbud'}</button>`:''}</div></div>`;}).join('')}</div>`;
  // admin controls
  if(isAdmin()){
    if(r.status==='open'){
      body+=`<div class="paper pad"><div class="admin-note">Admin · deadline kl. 10</div>
        <p style="font-size:13px;color:var(--ink-soft);margin-bottom:12px">Når du lukker runden, samles de indsendte spil til kuponen. Den, der hverken har indsendt eller meldt afbud, får et kort. ${subs===0?'Der er endnu ingen spil at danne en kupon af.':subs===1?'Med kun ét spil bliver kuponen et enkelt single.':'Kuponen spilles som en '+subs+'-ling.'}</p>

    body+=`<div class="paper pad"><div class="empty" style="padding:8px 0">Runden er låst. Admin afgør resultaterne efter kampene.</div></div>`;
  }
  el.innerHTML=`<section><div class="eyebrow">Runde ${roundNo(r)} · ${r.status==='open'?deadlineText(r.date):fmtDate(r.date)}</div>${body}</section>`;
  if(r.status==='open'&&!myPick)wireSubmitForm();

const LIVE_SPORT_LABELS={football:'Fodbold', handball:'Håndbold', basketball:'Basketball', hockey:'Ishockey', cs2:'Esport', tennis:'Tennis'};
const LIVE_DEFAULT_MARKET={football:'1X2 (Moneyline)', handball:'1X2 (Moneyline)', basketball:'1X2 (Moneyline)', hockey:'1X2 (Moneyline)', cs2:'Kampvinder', tennis:'Kampvinder'};
function liveSports(){ return Object.keys(LIVE_SPORT_LABELS).filter(k=>((S.fixturesLive&&S.fixturesLive[k])||[]).length>0); }
function allLiveFixturesFlat(){ const out=[]; liveSports().forEach(k=>((S.fixturesLive&&S.fixturesLive[k])||[]).forEach(f=>out.push({...f, sportKey:k}))); return out; }
function liveLeaguesFor(sportKey){ return [...new Set(((S.fixturesLive&&S.fixturesLive[sportKey])||[]).map(f=>f.league.name))]; }
function liveFixturesFor(sportKey,leagueName){ return ((S.fixturesLive&&S.fixturesLive[sportKey])||[]).filter(f=>f.league.name===leagueName).sort((a,b)=>a.date.localeCompare(b.date)); }
function fmtKickoff(iso){ try{ return new Date(iso).toLocaleString('da-DK',{weekday:'short',hour:'2-digit',minute:'2-digit',timeZone:'Europe/Copenhagen'}); }catch(e){ return iso; } }
function fmtUpdatedAt(ts){
  if(!ts) return '';
  try{
    const d=new Date(ts); const now=new Date();
    const sameDay=d.toDateString()===now.toDateString();
    const time=d.toLocaleString('da-DK',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Copenhagen'});
    const day=sameDay?'i dag':d.toLocaleDateString('da-DK',{day:'numeric',month:'numeric',timeZone:'Europe/Copenhagen'});
    return `Opdateret ${day} kl. ${time}`;
  }catch(e){ return ''; }
}
function liveSectionHTML(){
  const sports=liveSports();
  if(!sports.length) return '';
  const firstSport=sports[0]; const leagues=liveLeaguesFor(firstSport);
  const updated=fmtUpdatedAt(S.fixturesLive&&S.fixturesLive.updatedAt);

function wireSubmitForm(){
  const sportSel=document.getElementById('liveSportSel'), leagueSel=document.getElementById('liveLeagueSel');
  if(sportSel && leagueSel){
    const refreshLeagues=()=>{ leagueSel.innerHTML=liveLeaguesFor(sportSel.value).map(l=>`<option>${l}</option>`).join(''); renderLiveMatchList(sportSel.value, leagueSel.value); };
    sportSel.addEventListener('change', refreshLeagues);
    leagueSel.addEventListener('change', ()=>renderLiveMatchList(sportSel.value, leagueSel.value));
    renderLiveMatchList(sportSel.value, leagueSel.value);
  }
  const inp=document.getElementById('matchSearch'); if(!inp)return;
  inp.addEventListener('input',()=>{
    const q=inp.value.trim().toLowerCase(); const box=document.getElementById('matchResults');
    if(q.length<2){box.classList.remove('show');box.innerHTML='';return;}
    const hits=allLiveFixturesFlat().filter(f=>f.home.toLowerCase().includes(q)||f.away.toLowerCase().includes(q)).slice(0,6);
    if(!hits.length){box.classList.add('show');box.innerHTML='<div class="mres"><span class="m">Ingen kommende kampe fundet — prøv »indtast manuelt«</span></div>';return;}
    box.classList.add('show');
    box.innerHTML=hits.map(f=>`<div class="mres" data-id="${f.id}"><div><div class="t">${f.home} – ${f.away}</div><div class="m">${f.league.name}</div></div><span class="sp">${LIVE_SPORT_LABELS[f.sportKey]}</span></div>`).join('');
    box.querySelectorAll('.mres[data-id]').forEach(d=>d.addEventListener('click',()=>{ const hit=hits.find(x=>x.id===d.dataset.id); if(hit)chooseLiveFixture(hit.sportKey,hit); box.classList.remove('show'); }));
  });
}

  function upd(){const d=descOf();document.getElementById('descPrev').textContent=d?('→ '+d):'';document.getElementById('submitPick').disabled=!formReady();}

async function submitPick(){
  const m=F.match; if(!m)return; const free=F.market==="Andet (skriv selv)";
  if(free){ if(!((F.free||'').trim()&&parseFloat(F.odds)>1))return; }
  else if(!formReady())return;
  const bt = free?"Andet" : F.market==="Over/Under"?("Over/Under "+F.ouUnit) : (BETTYPE[F.market]||"Andet");
  const r=openRound();
  r.picks[S.user]={ sport:m.sport, league:m.league, home:m.home, away:m.away,

    desc: free?(F.free||'').trim():descOf(), odds:parseFloat(F.odds), hit:null, closing:null };

function bestBy(field,name){const a=aggBy(field,name);let best=null,br=-1;for(const k in a){if(a[k].picks<2)continue;const r=a[k].hits/a[k].picks;if(r>br){br=r;best=k;}}if(!best)for(const k in a){const r=a[k].hits/a[k].picks;if(r>br){br=r;best=k;}}return best?`${best} ${Math.round(br*100)}%`:'–';}
function aggTable(field,head){const a=aggBy(field);const rows=Object.keys(a).sort((x,y)=>a[y].picks-a[x].picks).map(k=>{const o=a[k];const hr=o.picks?o.hits/o.picks:0;const avg=o.hits?o.sumHit/o.hits:0;return `<tr><td>${k}</td><td>${o.picks}</td><td>${Math.round(hr*100)}%</td><td>${avg?avg.toFixed(2):'–'}</td></tr>`;}).join('');return `<table><tr><th>${head}</th><th>Spil</th><th>Hit%</th><th>Snit ramt</th></tr>${rows}</table>`;}
function bandTable(){const a=aggBand();const order=["≤ 1,10","1,11–1,25","1,26–1,40","1,41–1,60","1,61–2,00","2,01–3,00","3,01–5,00","Over 5,00"];const rows=order.filter(k=>a[k]).map(k=>{const o=a[k];return `<tr><td>${k}</td><td>${o.picks}</td><td>${Math.round(o.hits/o.picks*100)}%</td></tr>`;}).join('');return `<table><tr><th>Odds-bånd</th><th>Spil</th><th>Hit%</th></tr>${rows}</table>`;}

function recomputeMonthFines(key){   // genberegn taber-bøder for en allerede lukket måned (efter en redigering)

  const due=nextMonthKey(key);

  S.fines=S.fines.filter(f=>!(f.kind==='taber'&&(f.srcMonth===key||f.dueMonth===due)));
  const rs=settledRounds().filter(r=>r.date.slice(0,7)===key); const mls=monthLosers(rs); const frik=monthFrikendt(key);
  mls.forEach(x=>{ if(frik.has(x.name))return; S.fines.push({id:'f'+Date.now()+Math.floor(Math.random()*1000),player:x.name,kind:'taber',amount:x.penalty,paid:false,dueMonth:due,srcMonth:key,ts:Date.now()}); });
  const newTxt=mls.filter(x=>!frik.has(x.name)).map(x=>nameOf(x.name)+' (+'+x.penalty+' kr)').join(', ');

async function addMember(){
  if(!isAdmin())return;
  const inp=document.getElementById('newMemberName'); const name=(inp&&inp.value||'').trim();
  const emailInp=document.getElementById('newMemberEmail'); const email=(emailInp&&emailInp.value||'').trim().toLowerCase();
  if(!name)return;
  if(!email){ toast("Skriv medlemmets e-mail, så personen kan oprette sit eget login."); return; }
  const existing=PLAYERS.some(n=>n.toLowerCase()===name.toLowerCase());
  if(existing){
    // Navnet er allerede i truppen (fx tilføjet direkte til spillerlisten uden en rigtig
    // login-invitation) — opret bare login-invitationen for det navn, uden at duplikere
    // spilleren eller lægge et nyt buy-in oveni.
    let already=null;
    try{ const snap=await invitesCol.doc(email).get(); already=snap.exists?snap.data():null; }
    catch(e){ console.error(e); toast("Kunne ikke tjekke e-mailen — prøv igen."); return; }
    if(already && already.used){ toast("Den e-mail har allerede en aktiv konto."); return; }
    try{ await invitesCol.doc(email).set({name, isAdmin:false, used:false}); }
    catch(e){ console.error(e); toast("Kunne ikke oprette login-invitationen — prøv igen."); return; }
    inp.value=''; emailInp.value='';
    toast(name+" har nu fået sin login-invitation 🎉\n\n"+name+" opretter selv sin adgangskode på login-skærmen (»Opret adgangskode her«) med e-mailen "+email+".");
    return;
  }
  const cc=contributions(); const buyin=Math.max(0,...PLAYERS.map(n=>cc[n].paid+cc[n].owed));
  PLAYERS.push(name); S.players=PLAYERS.slice();
  S.disc.players[name]={yellow:false,streak:0,reds:0};
  if(buyin>0) S.fines.push({id:'f'+Date.now()+Math.floor(Math.random()*1000),player:name,kind:'buyin',amount:buyin,paid:false,dueMonth:upcomingPayMonth(),ts:Date.now()});
  try{ await invitesCol.doc(email).set({name, isAdmin:false, used:false}); }catch(e){ console.error(e); toast("Kunne ikke oprette login-invitationen — prøv igen."); return; }
  await saveState(); moreView='admin'; renderAll(); go('more');
  toast(name+" er tilføjet 🎉\n\n"+name+" opretter selv sin adgangskode på login-skærmen (»Opret adgangskode her«) med e-mailen "+email+"."+(buyin>0?"\n\nBuy-in: "+buyin+" kr (matcher største samlede bidrag). Det står nu under Penge → Bøder & gebyrer som »mangler«, indtil "+name+" har betalt.":""));
}
async function toggleMemberActive(name){
  if(!isAdmin()||name===ADMIN)return;
  const activeNow=isActivePlayer(name); // true = medlemmet er aktivt lige nu, så handlingen er at DEAKTIVERE
  confirmModal(activeNow?`Deaktivér ${nameOf(name)}? Personens login spærres, og der kommer ikke flere kort for manglende spil/betaling. Historik og point bevares.`:`Aktivér ${nameOf(name)} igen? Login åbnes, og personen tæller med i kommende runder/betalinger igen.`, async ()=>{
    let inviteFound=true;
    try{
      const q=await invitesCol.where('name','==',name).limit(1).get();
      inviteFound=!q.empty;
      if(inviteFound) await q.docs[0].ref.set({active:!activeNow},{merge:true});
    }catch(e){ console.error(e); toast("Kunne ikke ændre login-status — prøv igen."); return; }
    S.inactivePlayers=S.inactivePlayers||[];
    if(activeNow){ if(!S.inactivePlayers.includes(name)) S.inactivePlayers.push(name); }
    else S.inactivePlayers=S.inactivePlayers.filter(x=>x!==name);
    await saveState(); renderAll();
    toast((activeNow?nameOf(name)+" er deaktiveret.":nameOf(name)+" er aktiveret igen.")+(inviteFound?"":" (Ingen login-invitation fundet endnu — kun spil/betaling er slået fra.)"));
  }, activeNow?"Deaktivér":"Aktivér");
}
function hasPower(name,type){ return (S.power.arsenal[name]||[]).includes(type); }
function expFor(name){
  let exp=0, streak=0;
  const rs=settledRounds().slice().sort((a,b)=>a.date.localeCompare(b.date)||a.id-b.id);
  for(const r of rs){ const p=r.picks[name]; if(!isCounting(p))continue;
    let e=5; if(p.hit){ e+=10; if(p.odds>=1.5)streak++; } else streak=0;
    if(streak>=4)e*=2; exp+=e;
  }
  expAchievements(name).forEach(a=>{ if(a.got)exp+=a.exp; });
  return exp;
}
function currentStreak(name){ let s=0; settledRounds().slice().sort((a,b)=>a.date.localeCompare(b.date)||a.id-b.id).forEach(r=>{const p=r.picks[name];if(!isCounting(p))return;if(p.hit){if(p.odds>=1.5)s++;}else s=0;}); return s; }
function expAchievements(name){
  const ps=allPicksOf(name); const st=statsFor(name); const hits=ps.filter(p=>p.hit).length;
  let king=false; const byM={}; settledRounds().forEach(r=>(byM[r.date.slice(0,7)]||=[]).push(r));
  Object.values(byM).forEach(rs=>{ const {raw,elig}=monthPoints(rs); if(elig.length<2)return; const top=Math.max(...elig.map(n=>raw[n])); if(elig.includes(name)&&raw[name]===top)king=true; });
  const reds=(S.disc.players[name]||{}).reds||0;
  return [
    {key:'big3', name:'Longshot', desc:'Ramt et odds over 3,0', exp:20, got:ps.some(p=>p.hit&&p.odds>=3)},
    {key:'big5', name:'Gigantdræber', desc:'Ramt et odds over 5,0', exp:40, got:ps.some(p=>p.hit&&p.odds>=5)},
    {key:'sharp', name:'Skarpskytte', desc:'Ramt 10 spil i alt', exp:20, got:hits>=10},
    {key:'value', name:'Værdijæger', desc:'Sæson-TB% over 130% (min. 8 spil)', exp:25, got:st.picks>=8&&st.tb>=130},
    {key:'king', name:'Måneds-konge', desc:'Vundet mindst én måned', exp:25, got:king},
    {key:'disc', name:'Disciplineret', desc:'Spillet 10 runder uden et rødt kort', exp:20, got:ps.length>=10&&reds===0}
  ];
}
function spinsAvailable(name){ return Math.max(0, Math.floor(expFor(name)/EXP_PER_SPIN) - (S.power.spun[name]||0)); }
function rollPower(){ let r=Math.random()*100,acc=0; for(const [t,w] of WHEEL){acc+=w; if(r<acc)return t;} return 'varcheck'; }

function showSpinOverlay(result,onKeep){

      });
    }

function takeFromArsenal(name,type){ const a=S.power.arsenal[name]||[]; const i=a.indexOf(type); if(i>=0)a.splice(i,1); }
function declaredBy(r,name){ return (r.powers||[]).filter(p=>p.by===name); }
async function jokerConvert(type){
  const me=S.user; if(!hasPower(me,'joker'))return;
  takeFromArsenal(me,'joker'); S.power.arsenal[me].push(type);
  S.power.log.push({ts:Date.now(),text:nameOf(me)+" forvandlede en Joker til "+POWERS[type].name});
  await saveState(); renderAll();
}
async function recallPower(i){
  const me=S.user; const r=openRound(); if(!r||r.status!=='open')return;
  const mine=(r.powers||[]).map((p,idx)=>({p,idx})).filter(o=>o.p.by===me);
  const hit=mine[i]; if(!hit)return;
  r.powers.splice(hit.idx,1);
  S.power.arsenal[me]=S.power.arsenal[me]||[]; S.power.arsenal[me].push(hit.p.type);
  await saveRoundMerge(r.id, {powers: FV.arrayRemove(hit.p)}); await saveState(); renderAll();
}
async function usePower(type,target){
  const me=S.user; if(!hasPower(me,type)){ toast("Du har ikke den power-up."); return; }
  if(type==='varcheck'){
    const tgt=target||me; const p=S.disc.players[tgt]; const had=p&&p.yellow;
    if(p){p.yellow=false;p.streak=0;}
    takeFromArsenal(me,type);
    S.disc.log.push({ts:Date.now(),player:tgt,event:"VAR-check",reason:"gult fjernet via power-up af "+nameOf(me)});
    S.power.log.push({ts:Date.now(),text:nameOf(me)+" brugte VAR-check på "+nameOf(tgt)});
    await saveState(); renderAll();
    toast("📺 VAR-check brugt på "+nameOf(tgt)+(had?" — gult kort fjernet.":" — der var intet gult kort at fjerne."));
    return;
  }
  const r=openRound();
  if(!r||r.status!=='open'){ toast("Power-ups meldes før en runde låses — der er ingen åben runde lige nu."); return; }
  const decl={by:me,type,target:target||null}; r.powers=r.powers||[]; r.powers.push(decl);
  takeFromArsenal(me,type);
  await saveRoundMerge(r.id, {powers: FV.arrayUnion(decl)}); await saveState(); renderAll();
  toast(POWERS[type].icon+" "+POWERS[type].name+" meldt"+(target?" mod "+nameOf(target):"")+" — afsløres når runden låses.");
}
async function sendNotif(type){
  if(!isAdmin())return;
  const r=openRound(); let title,recips;
  if(type==='spil'){ recips=(r&&r.status==='open')?PLAYERS.filter(n=>!r.picks[n]&&!(r.absent||[]).includes(n)):[]; title="Husk at sende dit spil — deadline om 24 timer ⏰"; }
  else if(type==='betal'){ const m=new Date().toISOString().slice(0,7); const pm=S.payments[m]||{}; recips=PLAYERS.filter(n=>!pm['fee_'+n]); title="Husk indbetaling — frist om 24 timer 💰"; }
  else if(type==='lukket'){ recips=PLAYERS; title="Kuponen er lukket — held og lykke 🎟️"; }
  else { recips=PLAYERS; title="Månedsbesked til hele klubben"; }
  if(type!=='maaned' && type!=='lukket' && !recips.length){ toast("🔔 Ingen mangler lige nu — ingen besked sendt."); return; }
  // Selve afsendelsen sker via planlæggeren (GitHub Actions), som tjekker denne kø hvert kvarter.
  try{
    await CLUB.collection('state').doc('notifTracker').set({manualRequest:{type, ts:Date.now(), by:S.user}}, {merge:true});
    toast("🔔 Lagt i kø til "+(recips.length===PLAYERS.length?"alle":recips.map(nameOf).join(", "))+" — sendes som push-notifikation inden for et kvarter:\n\n»"+title+"«");
  }catch(e){ console.error(e); toast("Kunne ikke lægge beskeden i kø — prøv igen."); }
}
function expSection(){

  const ach=expAchievements(me);
  const flame=cs>=4?`<div style="font-size:13px;color:var(--lost);font-weight:600;margin-top:6px">🔥 ×2 EXP aktiv · ${cs} i træk</div>`:cs===3?`<div style="font-size:13px;color:var(--amber-soft);margin-top:6px">🔥 Én rigtig mere = ×2 EXP!</div>`:'';
  return `<div class="paper pad" style="margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;align-items:baseline"><div class="admin-note">Din EXP</div><div style="font-family:'JetBrains Mono';font-size:13px;color:var(--ink-soft)">${exp} EXP</div></div>
    <div style="height:10px;background:rgba(0,0,0,.12);border-radius:6px;overflow:hidden;margin:10px 0 6px"><div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--amber),var(--amber-soft))"></div></div>
    <div style="font-size:12px;color:var(--ink-soft)">${spins>0?'<b style="color:var(--won)">'+spins+' spin'+(spins>1?'s':'')+' klar!</b> · ':''}${EXP_PER_SPIN-into} EXP til næste${spins>0?'':' spin'}</div>${flame}
    <button class="btn ${spins>0?'btn-dark':'btn-ghost'}" style="margin-top:12px;width:100%" ${spins>0?'':'disabled'} onclick="spinWheel()">🎰 Spin tyveknægten${spins>0?' ('+spins+')':''}</button>
    <details style="margin-top:12px"><summary style="font-size:12px;color:var(--amber-soft);cursor:pointer">Sådan tjener du EXP</summary>
      <div style="font-size:12px;color:var(--ink-soft);line-height:1.7;margin-top:8px">+5 EXP for hver runde du spiller · +10 når du rammer. Rammer du 3 i træk (odds fra 1,50), tænder 🔥 og du får <b>×2 EXP fra 4. spil og frem</b> — indtil du misser. Plus opgaverne nedenfor. Tærskel: ${EXP_PER_SPIN} EXP = 1 spin.</div>
      <div style="margin-top:8px">${ach.map(a=>`<div style="display:flex;justify-content:space-between;gap:10px;padding:4px 0;font-size:12px"><span style="color:${a.got?'var(--won)':'var(--ink-soft)'}">${a.got?'✓':'○'} ${a.name} · ${a.desc}</span><span style="font-family:'JetBrains Mono';color:var(--ink-soft)">+${a.exp}</span></div>`).join('')}</div>
    </details></div>`;
}

    if(t==='joker'){ ctrl=POWER_ORDER.filter(x=>x!=='joker').map(x=>`<button class="chk" onclick="jokerConvert('${x}')">${POWERS[x].icon} ${POWERS[x].name}</button>`).join(''); }
    else if(P.need==='opp'){ ctrl=opp.map(o=>`<button class="chk" onclick="usePower('${t}','${o}')">→ ${nameOf(o)}</button>`).join(''); }

    else { ctrl=`<button class="chk" onclick="usePower('${t}')">${t==='frikendelse'?'Meld frikendelse':t==='skjold'?'Rejs skjold':'Brug på mig'}</button>`; }
    return `<div class="pwr-card"><div class="pwr-h">${P.icon} ${P.name}${cnt(t)>1?' ×'+cnt(t):''}</div><div class="pwr-d">${P.desc}${t==='joker'?' — vælg hvad den bliver til:':''}</div><div class="pwr-targets">${ctrl}</div></div>`;
  }).join(''); }
  const intel=`<div class="paper">${PLAYERS.map(n=>{const a=S.power.arsenal[n]||[];return `<div class="sub-row"><div><div class="nm">${nameOf(n)}${n===me?' (dig)':''}</div><div class="desc">${a.length?a.map(t=>POWERS[t].icon).join(' '):'tomt'}</div></div><span class="badge b-odds">${a.length}</span></div>`;}).join('')}</div>`;
  const lastDate=settledRounds().slice(-1)[0]; const mk=((r&&r.date)||(lastDate&&lastDate.date)||'').slice(0,7);
  const revealed=[]; S.rounds.filter(x=>x.date.slice(0,7)===mk && x.status!=='open').forEach(x=>(x.powers||[]).forEach(p=>revealed.push(`R${roundNo(x)} · ${nameOf(p.by)} ${POWERS[p.type].icon} ${POWERS[p.type].name}${p.target?' → '+nameOf(p.target):''}`)));
  return `<div class="paper pad" style="margin-bottom:14px"><p style="font-size:13px;color:var(--ink-soft)">Power-ups påvirker kun <b>månedens stilling</b> — altså hvem der ender sidst og betaler taber-bøden den måned. De rører <b>aldrig sæsontabellen eller statistikken</b>: dine rå point, TB%, hitrate og held står urørt. Alt meldes <b>før</b> runden låses; ingen ser andres meldinger før da — men alles arsenal er åbent.</p></div>

    <div class="eyebrow" style="margin-top:16px">Alles arsenal · åben efterretning</div>${intel}

    <div class="eyebrow" style="margin-top:20px">Alle power-ups · hvad de gør</div>
    <div class="paper">${POWER_ORDER.map(t=>{const P=POWERS[t];return `<div class="sub-row" style="align-items:flex-start"><div style="display:flex;gap:10px"><span style="font-size:20px;line-height:1.2">${P.icon}</span><div><div class="nm">${P.name}</div><div class="desc" style="margin-top:2px">${P.desc}</div></div></div></div>`;}).join('')}</div>
    <p style="font-size:11px;color:var(--ink-soft);margin-top:8px">Power-ups vindes på den enarmede tyveknægt, når du optjener EXP og spins. De flytter kun stillingen — aldrig statistikken.</p>

async function changePassword(){
  const cur=document.getElementById('pwCur').value;
  const n1=document.getElementById('pwNew').value;
  const n2=document.getElementById('pwNew2').value;
  const errEl=document.getElementById('pwErr'); errEl.style.color='var(--lost)'; errEl.textContent='';
  if(!cur||!n1){ errEl.textContent='Udfyld alle felter.'; return; }
  if(n1.length<6){ errEl.textContent='Ny adgangskode skal være mindst 6 tegn.'; return; }
  if(n1!==n2){ errEl.textContent='De to nye adgangskoder er ikke ens.'; return; }
  try{
    const cred=firebase.auth.EmailAuthProvider.credential(auth.currentUser.email, cur);
    await auth.currentUser.reauthenticateWithCredential(cred);
    await auth.currentUser.updatePassword(n1);
    errEl.style.color='var(--won)'; errEl.textContent='Adgangskoden er skiftet.';
    document.getElementById('pwCur').value=''; document.getElementById('pwNew').value=''; document.getElementById('pwNew2').value='';
  }catch(e){ errEl.textContent=loginErrText(e); }
}

function exportSeasonCSV(idx){
  const e=S.archive[idx]; if(!e)return;
  const esc=v=>{const s=(v==null?'':String(v)); return /[";\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;};

  rows.push(["Runder spillet", (e.rounds||[]).length]); rows.push(["Måneder", e.months||""]);
  rows.push(["Samlet pulje (kr)", e.pool!=null?e.pool:""]);

  rows.push(["SÆSONTABEL"]);

  (e.table||[]).forEach(t=>rows.push([t.rank,t.name,t.points,t.hitrate+"%",t.tb+"%",t.net,t.picks,t.hits,t.festkr]));
  rows.push([]);
  rows.push(["INDBETALINGER"]);
  rows.push(["Spiller","Indbetalt (kr)","Mangler (kr)","I alt skyldigt (kr)"]);
  if(e.payments) Object.keys(e.payments).forEach(n=>{const p=e.payments[n];rows.push([nameOf(n),p.paid,p.owed,p.paid+p.owed]);});
  rows.push([]);
  rows.push(["DISCIPLIN"]);
  rows.push(["Spiller","Gult kort nu","Røde kort i alt"]);
  if(e.disc) Object.keys(e.disc).forEach(n=>{const d=e.disc[n];rows.push([nameOf(n),d.yellow?"ja":"nej",d.reds]);});
  rows.push([]);
  rows.push(["RUNDER"]);
  rows.push(["Runde","Dato","Resultat","Indsats","Samlet odds","Netto (kr)"]);
  (e.rounds||[]).forEach(r=>rows.push([r.no,r.date,r.result,r.stake,r.odds,r.net]));
  rows.push([]);
