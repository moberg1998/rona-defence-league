name: Find league IDs (engangs-værktøj)

on:
  workflow_dispatch: {}

jobs:
  find:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scheduler
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: node find-league-ids.mjs
        env:
          API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
