name: Fetch live fixtures

on:
  schedule:
    # 00:00 UTC = kl. 02:00 dansk sommertid (kl. 01:00 om vinteren — GitHub Actions'
    # cron kender ikke til sommertid, så det rykker sig automatisk en time to gange om året).
    - cron: '0 0 * * *'
  workflow_dispatch: {}

jobs:
  fetch:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scheduler
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: node fetch-fixtures.mjs
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
          ODDSPAPI_KEY: ${{ secrets.ODDSPAPI_KEY }}
